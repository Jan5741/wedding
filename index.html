<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>婚禮規劃</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f8f6;--bg3:#f0efe9;
  --border:#e5e3db;--border2:#ccc9be;
  --text:#1c1c1a;--text2:#5c5a54;--text3:#9a9890;
  --accent:#b8956a;--accent-l:#f5ede2;
  --green:#6a9e72;--green-l:#edf5ee;
  --red:#c0392b;--blue:#5b8fa8;
  --shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --r:10px;--r2:6px;--r3:16px;
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg2);color:var(--text);min-height:100vh;font-size:14px}

/* SIDEBAR */
#sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:199}
#sb-overlay.show{display:block}
#sidebar{position:fixed;top:0;left:-220px;width:200px;height:100vh;background:var(--bg);border-right:1px solid var(--border);z-index:200;transition:left .25s ease;display:flex;flex-direction:column;box-shadow:4px 0 20px rgba(0,0,0,.08)}
#sidebar.open{left:0}
.sb-top{padding:18px 14px 12px;border-bottom:1px solid var(--border)}
.sb-logo{font-family:'Playfair Display',serif;font-size:14px;color:var(--text);margin-bottom:12px}
.sb-date{font-size:11px;color:var(--text2);padding:5px 8px;background:var(--bg2);border-radius:var(--r2);margin-bottom:5px;cursor:pointer;transition:background .15s}
.sb-date:hover{background:var(--bg3)}
.sb-date-lbl{color:var(--text3);font-size:10px;margin-bottom:1px}
.sb-date-val{color:var(--text);font-weight:500;font-size:12px}
.sb-date-cd{color:var(--accent);font-size:10px}
.sb-nav{flex:1;padding:8px 6px;overflow-y:auto}
.sb-btn{display:flex;align-items:center;gap:8px;width:100%;padding:9px 10px;border:none;background:transparent;cursor:pointer;border-radius:var(--r2);color:var(--text2);font-family:'Noto Sans TC',sans-serif;font-size:12px;transition:all .15s;text-align:left;margin-bottom:2px}
.sb-btn:hover{background:var(--bg2);color:var(--text)}
.sb-btn.active{background:var(--accent-l);color:var(--accent);font-weight:500}
.sb-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sb-divider{height:1px;background:var(--border);margin:5px 6px}
.sb-sync{padding:8px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text3)}
.sync-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;background:#ccc}
.sync-dot.ok{background:var(--green)}.sync-dot.err{background:var(--red)}.sync-dot.loading{background:var(--accent);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;height:50px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;box-shadow:0 1px 0 var(--border)}
.hamburger{background:transparent;border:none;font-size:20px;cursor:pointer;color:var(--text2);padding:5px;border-radius:var(--r2);line-height:1}
.hamburger:hover{background:var(--bg2)}
.topbar-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--text)}
.topbar-chips{display:flex;gap:5px;margin-left:auto}
.chip{padding:3px 9px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;font-size:10px;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip-cd{color:var(--accent);font-weight:500}

/* CONTENT */
.content{padding:16px;max-width:800px;margin:0 auto}
.tab-panel{display:none}.tab-panel.active{display:block}

/* CARDS */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.card-title{font-family:'Playfair Display',serif;font-size:14px;color:var(--text);margin-bottom:0;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.card-title-arrow{font-size:13px;color:var(--text3);transition:transform .2s}
.card-title-arrow.open{transform:rotate(90deg)}
.card-body{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.card-body.open{display:block}

/* INPUTS */
.field{margin-bottom:0}
.field label{display:block;font-size:10px;color:var(--text3);margin-bottom:3px;letter-spacing:.4px;text-transform:uppercase}
.frow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.frow .field{flex:1;min-width:80px}
input[type=text],input[type=number],input[type=date],input[type=time],select,textarea{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r2);font-family:'Noto Sans TC',sans-serif;font-size:13px;color:var(--text);background:var(--bg2);outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--bg)}
textarea{resize:vertical;min-height:48px}
.btn{padding:7px 14px;border:none;border-radius:var(--r2);font-family:'Noto Sans TC',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#9e7a52}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}.btn-ghost:hover{background:var(--bg2)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-del{background:transparent;border:none;color:var(--border2);cursor:pointer;font-size:13px;padding:3px 5px;transition:color .15s;line-height:1}.btn-del:hover{color:var(--red)}

/* ITEM CARDS */
.item-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);margin-bottom:7px;overflow:hidden;transition:box-shadow .15s}
.item-card:hover{box-shadow:var(--shadow)}
.item-row{display:flex;align-items:center;gap:8px;padding:11px 13px;cursor:pointer}
.item-body{flex:1;min-width:0}
.item-title{font-size:13px;color:var(--text);line-height:1.4}
.item-title.done{text-decoration:line-through;color:var(--text3);opacity:.6}
.item-sub{font-size:11px;color:var(--text3);margin-top:3px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.tag{font-size:10px;padding:2px 7px;border-radius:8px;background:var(--bg3);color:var(--text2)}
.tag.urgent{background:#fdecea;color:var(--red)}.tag.done-t{background:var(--green-l);color:var(--green)}

/* VENDOR COLORS */
.vcolor-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.vendor-color-bar{width:4px;border-radius:2px 0 0 2px;align-self:stretch;flex-shrink:0}

/* EDIT MODAL */
#edit-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300;align-items:flex-end;justify-content:center}
#edit-modal.show{display:flex}
.edit-sheet{background:var(--bg);border-radius:var(--r3) var(--r3) 0 0;width:100%;max-width:580px;max-height:88vh;overflow-y:auto;padding:18px}
.edit-sheet-title{font-family:'Playfair Display',serif;font-size:15px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.edit-sheet-title button{background:transparent;border:none;font-size:20px;cursor:pointer;color:var(--text3)}

/* ATTACHMENTS */
.attach-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px}
.attach-img{position:relative;width:66px;height:66px;border-radius:var(--r2);overflow:hidden;border:1px solid var(--border);cursor:pointer;flex-shrink:0}
.attach-img img{width:100%;height:100%;object-fit:cover}
.attach-del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:15px;height:15px;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.attach-file{display:flex;align-items:center;gap:5px;padding:5px 9px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);font-size:11px;color:var(--text2);max-width:150px;flex-shrink:0}
.attach-file-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.attach-add{width:66px;height:66px;border:1.5px dashed var(--border2);border-radius:var(--r2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:10px;color:var(--text3);gap:2px;background:var(--bg2);transition:all .15s;flex-shrink:0}
.attach-add:hover{border-color:var(--accent);color:var(--accent)}

/* LIGHTBOX */
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;align-items:center;justify-content:center}
#lightbox.show{display:flex}
#lightbox img{max-width:92vw;max-height:92vh;object-fit:contain;border-radius:var(--r2)}
#lb-close{position:absolute;top:14px;right:18px;background:transparent;border:none;color:#fff;font-size:26px;cursor:pointer;opacity:.7}
#lb-close:hover{opacity:1}

/* PROGRESS */
.prog-wrap{background:var(--bg3);border-radius:10px;height:4px;margin:8px 0 3px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--green),var(--accent));border-radius:10px;transition:width .5s}
.prog-lbl{font-size:10px;color:var(--text3);text-align:right}

/* BUDGET */
.bsum-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:2px}
.bsum{border-radius:var(--r);padding:13px;text-align:center;border:1px solid var(--border)}
.bsum.paid{background:var(--green-l)}.bsum.unpaid{background:var(--accent-l)}
.bsum .bl{font-size:10px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.bsum .ba{font-family:'Playfair Display',serif;font-size:22px}
.bsum.paid .ba{color:var(--green)}.bsum.unpaid .ba{color:var(--accent)}
.btotal{text-align:center;padding:8px 0;font-size:12px;color:var(--text2)}
.btotal strong{font-family:'Playfair Display',serif;font-size:18px;color:var(--text);margin-left:5px}

/* VENDOR STATUS */
.vstatus{font-size:10px;padding:2px 7px;border-radius:8px;display:inline-block}
.vstatus-confirmed{background:var(--green-l);color:var(--green)}
.vstatus-pending{background:var(--accent-l);color:var(--accent)}
.vstatus-cancelled{background:#fdecea;color:var(--red)}

/* GUEST */
.g-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.g-stat{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px 6px;text-align:center;box-shadow:var(--shadow)}
.g-stat .gnum{font-family:'Playfair Display',serif;font-size:20px}
.g-stat .glbl{font-size:10px;color:var(--text3);margin-top:1px}
.rsvp-yes{background:var(--green-l);color:var(--green)}.rsvp-no{background:#fdecea;color:var(--red)}.rsvp-pending{background:var(--bg3);color:var(--text3)}

/* CALENDAR */
.cal-toolbar{display:flex;align-items:center;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.cal-title{font-family:'Playfair Display',serif;font-size:15px;color:var(--text);min-width:130px;text-align:center}
.cal-nav{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:5px 12px;font-size:13px;cursor:pointer;color:var(--text2);transition:all .15s}
.cal-nav:hover{background:var(--bg3)}
.cal-today-btn{padding:5px 10px;font-size:11px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);cursor:pointer;color:var(--text2);transition:all .15s}
.cal-today-btn:hover{border-color:var(--accent);color:var(--accent)}
.view-tabs{display:flex;border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-left:auto}
.view-tab{padding:5px 12px;border:none;background:transparent;font-size:11px;color:var(--text2);cursor:pointer;transition:all .15s;font-family:'Noto Sans TC',sans-serif}
.view-tab.active{background:var(--accent-l);color:var(--accent)}
.cal-jump{display:flex;gap:5px}
.cal-jump select{padding:4px 7px;font-size:11px;border:1px solid var(--border);border-radius:var(--r2);background:var(--bg2);color:var(--text)}
.cal-month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.cal-dow{background:var(--bg2);text-align:center;font-size:10px;color:var(--text3);padding:6px 3px;letter-spacing:.3px}
.cal-cell{background:var(--bg);min-height:80px;padding:4px;cursor:pointer;transition:background .1s;position:relative}
.cal-cell:hover{background:var(--bg2)}
.cal-cell.other{background:var(--bg2)}.cal-cell.other .cnum{color:var(--text3)}
.cal-cell.today .cnum{background:var(--accent);color:#fff;border-radius:50%}
.cal-cell.selected{background:var(--accent-l)}
.cal-cell.wedding-d{background:#fdf3ea}.cal-cell.registry-d{background:var(--green-l)}
.cnum{width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;margin-bottom:2px}
.ev-pill{font-size:9px;padding:1px 4px;border-radius:3px;color:#fff;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.6}
.ev-pill.todo-p{background:var(--green)}
.special-tag{font-size:8px;padding:1px 4px;border-radius:3px;background:var(--accent);color:#fff;margin-bottom:2px;display:inline-block}
.week-wrap{border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.week-head{display:grid;grid-template-columns:42px repeat(7,1fr);background:var(--bg2);border-bottom:1px solid var(--border)}
.wh-cell{text-align:center;padding:6px 3px;font-size:10px;color:var(--text3)}
.wh-cell .wdate{font-size:14px;font-weight:500;color:var(--text);margin-top:1px}
.wh-cell.today-c .wdate{background:var(--accent);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;margin:2px auto 0}
.week-body{display:grid;grid-template-columns:42px repeat(7,1fr)}
.wtime-col{border-right:1px solid var(--border)}
.wtime{font-size:9px;color:var(--text3);padding:0 4px;height:38px;display:flex;align-items:flex-start;padding-top:2px;border-bottom:1px solid var(--border)}
.wday-col{border-right:1px solid var(--border);position:relative;cursor:pointer;transition:background .1s}
.wday-col:last-child{border-right:none}
.wday-col:hover{background:var(--bg2)}
.wslot{height:38px;border-bottom:1px solid var(--border)}
.wev{position:absolute;left:2px;right:2px;border-radius:3px;font-size:9px;padding:2px 3px;color:#fff;z-index:2;cursor:pointer;line-height:1.3;overflow:hidden}
.list-date-h{font-size:11px;color:var(--text3);padding:7px 0 5px;border-bottom:1px solid var(--border);margin-bottom:7px;text-transform:uppercase;letter-spacing:.4px}
.list-ev{display:flex;gap:9px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer}
.list-ev:last-child{border-bottom:none}
.list-ev-bar{width:3px;border-radius:2px;flex-shrink:0;min-height:16px;align-self:stretch}
.list-ev-title{font-size:12px;color:var(--text)}
.list-ev-meta{font-size:10px;color:var(--text3);margin-top:1px}
.ev-panel{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);margin-top:12px;box-shadow:var(--shadow);overflow:hidden}
.ev-panel-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.ev-panel-title{font-family:'Playfair Display',serif;font-size:14px;flex:1}
.ev-item{display:flex;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.ev-item:hover{background:var(--bg2)}.ev-item:last-child{border-bottom:none}
.ev-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.ev-body{flex:1;min-width:0}
.ev-title{font-size:12px;color:var(--text)}
.ev-meta{font-size:10px;color:var(--text3);margin-top:1px}
.ev-note{font-size:10px;color:var(--text2);margin-top:1px}
.ev-actions-row{display:flex;gap:4px;flex-shrink:0;align-items:flex-start}
.ev-edit-b{background:transparent;border:1px solid var(--border);border-radius:var(--r2);padding:2px 7px;font-size:10px;color:var(--text2);cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.ev-add-form{padding:12px 14px;border-top:1px solid var(--border)}
.color-row{display:flex;gap:5px;flex-wrap:wrap;margin:5px 0}
.cswatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0}
.cswatch:hover{transform:scale(1.2)}.cswatch.sel{border-color:var(--text);transform:scale(1.1)}

/* LOADING */
#loadingOverlay{position:fixed;inset:0;background:rgba(255,255,255,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:10px}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:32px 16px;color:var(--text3);font-size:12px}
.empty .emoji{font-size:24px;margin-bottom:6px}

@media(max-width:540px){
  .g-stats{grid-template-columns:repeat(2,1fr)}
  .bsum-grid{grid-template-columns:1fr}
  .topbar-chips{gap:3px}
  .chip{padding:3px 6px;font-size:9px}
}
</style>
</head>
<body>
<div id="loadingOverlay"><div class="spinner"></div><p style="font-size:12px;color:var(--text3)">載入中…</p></div>
<div id="lightbox"><button id="lb-close" onclick="closeLightbox()">✕</button><img id="lb-img" src="" alt=""></div>
<div id="sb-overlay" onclick="closeSidebar()"></div>
<div id="edit-modal" onclick="handleModalBg(event)"><div class="edit-sheet" id="edit-sheet">
  <div class="edit-sheet-title"><span id="edit-title">編輯</span><button onclick="closeEditModal()">✕</button></div>
  <div id="edit-body"></div>
  <div style="display:flex;gap:8px;margin-top:14px">
    <button class="btn btn-ghost" style="flex:1" onclick="closeEditModal()">取消</button>
    <button class="btn btn-primary" style="flex:1" id="edit-save-btn">儲存</button>
  </div>
</div></div>

<div id="sidebar">
  <div class="sb-top">
    <div class="sb-logo">💍 婚禮規劃</div>
    <div class="sb-date" onclick="editDate('wedding')"><div class="sb-date-lbl">💒 婚禮日期</div><div class="sb-date-val" id="sb-w-val">點擊設定</div><div class="sb-date-cd" id="sb-w-cd"></div></div>
    <div class="sb-date" onclick="editDate('registry')"><div class="sb-date-lbl">📋 登記日期</div><div class="sb-date-val" id="sb-r-val">點擊設定</div><div class="sb-date-cd" id="sb-r-cd"></div></div>
  </div>
  <div class="sb-nav">
    <button class="sb-btn active" onclick="switchTab('calendar',this)"><span class="sb-icon">📅</span>行事曆</button>
    <button class="sb-btn" onclick="switchTab('vendor',this)"><span class="sb-icon">🏪</span>廠商資訊</button>
    <button class="sb-btn" onclick="switchTab('budget',this)"><span class="sb-icon">💰</span>費用明細</button>
    <button class="sb-btn" onclick="switchTab('todo',this)"><span class="sb-icon">✅</span>待辦事項</button>
    <button class="sb-btn" onclick="switchTab('guest',this)"><span class="sb-icon">👥</span>賓客名單</button>
  </div>
  <div class="sb-sync"><div class="sync-dot loading" id="syncDot"></div><span id="syncLabel">同步中</span></div>
</div>

<div class="topbar">
  <button class="hamburger" onclick="openSidebar()">☰</button>
  <div class="topbar-title">婚禮規劃</div>
  <div class="topbar-chips">
    <div class="chip" onclick="editDate('wedding')">💒 <span id="chip-w">設定婚禮</span><span class="chip-cd" id="chip-w-cd"></span></div>
    <div class="chip" onclick="editDate('registry')">📋 <span id="chip-r">設定登記</span><span class="chip-cd" id="chip-r-cd"></span></div>
  </div>
</div>

<div class="content">

<!-- CALENDAR -->
<div id="tab-calendar" class="tab-panel active">
  <div class="card">
    <div class="cal-toolbar">
      <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
      <div class="cal-title" id="cal-title"></div>
      <button class="cal-nav" onclick="changeMonth(1)">›</button>
      <button class="cal-today-btn" onclick="goToday()">今天</button>
      <div class="cal-jump"><select id="cal-year-sel" onchange="jumpYear()"></select><select id="cal-month-sel" onchange="jumpMonth()"></select></div>
      <div class="view-tabs">
        <button class="view-tab active" id="vt-month" onclick="setView('month')">月</button>
        <button class="view-tab" id="vt-week" onclick="setView('week')">週</button>
        <button class="view-tab" id="vt-list" onclick="setView('list')">清單</button>

// ── IMAGE COMPRESS ────────────────────────────────────
function compressImage(file,maxW=800,quality=0.7){
  return new Promise(res=>{
    if(!file.type.startsWith('image/')){
      // non-image: convert to base64 directly but limit size
      const r=new FileReader();
      r.onload=()=>res({type:'doc',name:file.name,data:r.result});
      r.readAsDataURL(file);
      return;
    }
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      const scale=Math.min(1,maxW/Math.max(img.width,img.height));
      const w=Math.round(img.width*scale),h=Math.round(img.height*scale);
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      res({type:'img',name:file.name,data:canvas.toDataURL('image/jpeg',quality)});
    };
    img.onerror=()=>res(null);
    img.src=url;
  });
}

// ── FIREBASE ──────────────────────────────────────────
async function fbGet(){
  const res=await fetch(FIREBASE_URL+'/wedding.json');
  if(!res.ok)throw new Error(await res.text());
  return res.json();
}
async function fbSet(data){
  const res=await fetch(FIREBASE_URL+'/wedding.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  if(!res.ok)throw new Error(await res.text());
  return res.json();
}

// ── SAVE (immediate + debounce for rapid changes) ─────
async function saveData(){
  const j=JSON.stringify(db);
  localStorage.setItem(DB_KEY,j);
  lastJSON=j;
  setSyncState('loading','儲存中');
  if(saving){
    clearTimeout(saveTimer);
    saveTimer=setTimeout(()=>pushToFirebase(),500);
    return;
  }
  await pushToFirebase();
}

async function pushToFirebase(){
  if(saving)return;
  saving=true;
  try{
    await fbSet(db);
    lastJSON=JSON.stringify(db);
    localStorage.setItem(DB_KEY,lastJSON);
    setSyncState('ok','已同步');
  }catch(e){
    console.error(e);
    setSyncState('err','離線（本機已存）');
  }finally{saving=false;}
}

// ── LOAD ──────────────────────────────────────────────
async function loadData(){
  // Show cached instantly
  const cached=localStorage.getItem(DB_KEY);
  if(cached){
    try{
      const p=JSON.parse(cached);
      db={todos:[],expenses:[],vendors:[],guests:[],events:[],weddingDate:'',registryDate:'',cats:[...DEFAULT_CATS],...p};
      migrateData();lastJSON=cached;
    }catch(e){db={todos:[],expenses:[],vendors:[],guests:[],events:[],weddingDate:'',registryDate:'',cats:[...DEFAULT_CATS]};}
  }
  document.getElementById('loadingOverlay').style.display='none';
  renderAll();updateDates();populateSelects();
  setSyncState('loading','同步中');

  // Fetch from Firebase
  try{
    const p=await fbGet();
    if(p&&typeof p==='object'&&Object.keys(p).length>0){
      const j=JSON.stringify(p);
      if(j!==lastJSON){
        db={todos:[],expenses:[],vendors:[],guests:[],events:[],weddingDate:'',registryDate:'',cats:[...DEFAULT_CATS],...p};
        migrateData();lastJSON=j;
        localStorage.setItem(DB_KEY,j);
        renderAll();updateDates();populateSelects();
      }
    }else if(!cached){
      db={todos:[],expenses:[],vendors:[],guests:[],events:[],weddingDate:'',registryDate:'',cats:[...DEFAULT_CATS],...SEED};
      migrateData();
      await pushToFirebase();
      renderAll();updateDates();populateSelects();
    }
    setSyncState('ok','已同步');
  }catch(e){
    console.error(e);
    if(!cached){
      db={todos:[],expenses:[],vendors:[],guests:[],events:[],weddingDate:'',registryDate:'',cats:[...DEFAULT_CATS],...SEED};
      migrateData();renderAll();updateDates();populateSelects();
    }
    setSyncState('err','離線模式');
  }

  // Poll every 10s
  setInterval(async()=>{
    if(saving)return;
    try{
      const p=await fbGet();
      if(p&&typeof p==='object'&&Object.keys(p).length>0){
        const j=JSON.stringify(p);
        if(j!==lastJSON){
          db={todos:[],expenses:[],vendors:[],guests:[],events:[],weddingDate:'',registryDate:'',cats:[...DEFAULT_CATS],...p};
          migrateData();lastJSON=j;
          localStorage.setItem(DB_KEY,j);
          renderAll();updateDates();populateSelects();
          setSyncState('ok','已同步');
        }
      }
    }catch(e){}
  },10000);
}

function migrateData(){

  if(!db.expenses)db.expenses=[];
  if(!db.vendors)db.vendors=[];
  if(!db.guests)db.guests=[];
  if(!db.events)db.events=[];
  db.expenses=db.expenses.map(e=>e.paid===undefined?{...e,paid:e.status==='paid'?(e.amount||0):0,unpaid:e.status!=='paid'?(e.amount||0):0}:e);
  db.vendors=db.vendors.map(v=>({paid:0,unpaid:0,files:[],...v}));
  db.todos=db.todos.map(t=>({files:[],...t}));
  db.expenses=db.expenses.map(e=>({files:[],...e}));
  db.guests=db.guests.map(g=>({files:[],...g,note:g.note||''}));
}

  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');btn.classList.add('active');
  closeSidebar();
  if(name==='calendar')renderCalendar();
}
function toggleCard(id){
  const body=document.getElementById(id+'-body');
  const arrow=document.getElementById(id+'-arrow');
  if(!body)return;
  body.classList.toggle('open');
  if(arrow)arrow.classList.toggle('open');
}
function editDate(type){
  const cur=type==='wedding'?db.weddingDate:db.registryDate;
  const v=prompt('設定'+(type==='wedding'?'婚禮':'登記')+'日期（YYYY-MM-DD）：',cur||'');
  if(v===null)return;
  if(type==='wedding')db.weddingDate=v.trim();else db.registryDate=v.trim();
  updateDates();saveData();
}
function updateDates(){
  setChip('sb-w-val','sb-w-cd','chip-w','chip-w-cd',db.weddingDate,'婚禮');
  setChip('sb-r-val','sb-r-cd','chip-r','chip-r-cd',db.registryDate,'登記');
}
function setChip(vId,cId,cvId,ccId,ds,label){
  const v=document.getElementById(vId),c=document.getElementById(cId);
  const cv=document.getElementById(cvId),cc=document.getElementById(ccId);
  if(!ds){if(v)v.textContent='點擊設定';if(c)c.textContent='';if(cv)cv.textContent='設定'+label;if(cc)cc.textContent='';return;}
  const disp=ds.replace(/-/g,'/');
  if(v)v.textContent=disp;if(cv)cv.textContent=disp;
  const d=Math.ceil((new Date(ds)-new Date())/86400000);
  if(c)c.textContent=d>0?'倒數'+d+'天':'';if(cc)cc.textContent=d>0?' · 倒數'+d+'天':'';
}

async function handleCatChange(sel){
  if(sel.value!=='＋新增類別')return;
  const name=prompt('新增類別名稱：','');if(!name?.trim()){sel.value=getCats()[0];return}
  const t=name.trim();if(!db.cats)db.cats=[...DEFAULT_CATS];if(!db.cats.includes(t))db.cats.push(t);
  sel.innerHTML=catOpts(t);sel.value=t;populateSelects();await saveData();
}
async function handleVtypeChange(sel){

  sel.innerHTML=vtypeOpts(t);sel.value=t;populateSelects();await saveData();

// ── ATTACHMENTS ───────────────────────────────────────
// Global file action registry
const _fileActions={};
let _fileActIdx=0;
function regAction(fn){const k='_fa'+(++_fileActIdx);_fileActions[k]=fn;return k}
function callAction(k,...args){if(_fileActions[k])_fileActions[k](...args)}

function buildFileGrid(files,delFn,addFn){
  if(!files)files=[];
  const imgs=files.filter(f=>f.type==='img');
  const docs=files.filter(f=>f.type==='doc');
  const delKey=regAction(delFn);
  const addKey=regAction(addFn);
  let h='<div class="attach-grid">';
  imgs.forEach((f,i)=>{
    const safeData=f.data.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    h+=`<div class="attach-img" onclick="openLightbox('${safeData}')"><img src="${f.data}"><button class="attach-del" onclick="event.stopPropagation();callAction('${delKey}',${i})">✕</button></div>`;
  });
  docs.forEach((f,i)=>h+=`<div class="attach-file"><span>📄</span><span class="attach-file-name">${esc(f.name)}</span><button onclick="callAction('${delKey}',${i+imgs.length})" style="background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:11px">✕</button></div>`);
  h+=`<div class="attach-add" onclick="callAction('${addKey}')"><span style="font-size:18px">＋</span><span>加附件</span></div></div>`;
  return h;
}
function addFilesToItem(files,newFiles){
  if(!files)files=[];
  return[...files,...newFiles];
}
async function pickFiles(cb){
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*,application/pdf,.doc,.docx,.txt';inp.multiple=true;
  inp.onchange=async(e)=>{
    const results=[];
    for(const f of e.target.files){
      const r=await compressImage(f);
      if(r)results.push(r);
    }
    cb(results);
  };inp.click();
}

// ── VENDOR ↔ EXPENSE SYNC ─────────────────────────────
function syncAllVendorsToExpenses(){
  // Remove all vendor-linked expenses, rebuild from vendors
  const standalone=db.expenses.filter(e=>!e.vendorId);
  const vendorExps=db.vendors.filter(v=>v.paid||v.unpaid).map(v=>({
    id:v.id+100000,// deterministic id
    vendorId:v.id,
    name:v.name,
    cat:v.type,
    paid:v.paid||0,
    unpaid:v.unpaid||0,
    note:v.note||'',
    files:v.files||[]
  }));
  db.expenses=[...standalone,...vendorExps];
}

function syncVendorToExpense(v){
  // Remove old linked expense
  db.expenses=db.expenses.filter(e=>e.vendorId!==v.id);
  // Add new one if has amounts
  if(v.paid||v.unpaid){
    db.expenses.push({
      id:v.id+100000,
      vendorId:v.id,
      name:v.name,
      cat:v.type,
      paid:v.paid||0,
      unpaid:v.unpaid||0,
      note:v.note||'',
      files:v.files||[]
    });
  }
}

async function addVendor(){
  const name=document.getElementById('v-name').value.trim();if(!name)return;
  const v={id:Date.now(),name,type:document.getElementById('v-type').value,contact:document.getElementById('v-contact').value,phone:document.getElementById('v-phone').value,line:document.getElementById('v-line').value,status:document.getElementById('v-status').value,paid:parseFloat(document.getElementById('v-paid').value)||0,unpaid:parseFloat(document.getElementById('v-unpaid').value)||0,note:document.getElementById('v-note').value,files:[]};
  db.vendors.push(v);
  syncVendorToExpense(v);
  ['v-name','v-contact','v-phone','v-line','v-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('v-paid').value='';document.getElementById('v-unpaid').value='';
  renderVendors();renderExpenses();await saveData();
}

async function deleteVendor(id){
  const v=db.vendors.find(v=>v.id===id);
  if(!confirm('確定要刪除廠商「'+(v?v.name:'此廠商')+'」嗎？（對應費用也會一起刪除）'))return;
  db.vendors=db.vendors.filter(v=>v.id!==id);
  db.expenses=db.expenses.filter(e=>e.vendorId!==id);
  renderVendors();renderExpenses();await saveData();
}

async function addVendorFile(id){
  pickFiles(async results=>{
    const v=db.vendors.find(v=>v.id===id);if(!v)return;
    if(!v.files)v.files=[];
    v.files.push(...results);
    syncVendorToExpense(v);
    renderVendors();renderExpenses();
    // refresh modal file grid if open
    const el=document.getElementById('vendor-files-'+id);
    if(el)el.innerHTML=buildFileGrid(v.files,(idx)=>removeVendorFile(v.id,idx),()=>addVendorFile(v.id));
    await saveData();
  });
}
async function removeVendorFile(id,idx){
  if(!confirm('確定要刪除此附件嗎？'))return;
  const v=db.vendors.find(v=>v.id===id);if(!v||!v.files)return;
  v.files.splice(idx,1);
  syncVendorToExpense(v);
  renderVendors();renderExpenses();
  const el=document.getElementById('vendor-files-'+id);
  if(el)el.innerHTML=buildFileGrid(v.files,(idx)=>removeVendorFile(id,idx),()=>addVendorFile(id));
  await saveData();
}

function renderVendors(){
  const list=document.getElementById('vendor-list');
  if(!db.vendors.length){list.innerHTML='<div class="empty"><div class="emoji">🏪</div>還沒有廠商</div>';return}
  const sl={confirmed:'已確認',pending:'洽談中',cancelled:'已取消'};
  // Group by type
  const types=[...new Set(db.vendors.map(v=>v.type))].sort();
  let html='';
  types.forEach(type=>{
    const group=db.vendors.filter(v=>v.type===type);
    html+=`<div style="font-size:10px;font-weight:500;color:var(--text3);letter-spacing:.5px;padding:8px 4px 4px;text-transform:uppercase">${type}</div>`;
    html+=group.map(v=>{
      const col=getVendorColor(v.id);
      const paid=v.paid||0,unpaid=v.unpaid||0;
      return`<div class="item-card" style="border-left:4px solid ${col};margin-bottom:5px">
        <div class="item-row" onclick="openVendorDetail(${v.id})" style="cursor:pointer">
          <div class="item-body">
            <div class="item-title">${esc(v.name)}</div>
            <div class="item-sub">
              <span class="vstatus vstatus-${v.status}">${sl[v.status]}</span>
              ${paid?`<span style="font-size:10px;color:var(--green)">✅ $${paid.toLocaleString()}</span>`:''}
              ${unpaid?`<span style="font-size:10px;color:var(--accent)">⏳ $${unpaid.toLocaleString()}</span>`:''}
              ${v.note?`<span class="tag" style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(v.note.slice(0,20))}</span>`:''}
              ${(v.files||[]).length?`<span class="tag">📎 ${v.files.length}</span>`:''}
            </div>
          </div>
          <button class="btn-del" onclick="event.stopPropagation();deleteVendor(${v.id})">✕</button>
        </div>
      </div>`;
    }).join('');
  });
  list.innerHTML=html;
}

// ── EXPENSES ──────────────────────────────────────────
async function addExpense(){
  const name=document.getElementById('exp-name').value.trim();if(!name)return;
  const paid=parseFloat(document.getElementById('exp-paid').value)||0;
  const unpaid=parseFloat(document.getElementById('exp-unpaid').value)||0;
  if(!paid&&!unpaid)return;
  db.expenses.push({id:Date.now(),name,cat:document.getElementById('exp-cat').value,paid,unpaid,note:'',files:[]});
  document.getElementById('exp-name').value='';document.getElementById('exp-paid').value='';document.getElementById('exp-unpaid').value='';
  renderExpenses();await saveData();
}
async function deleteExpense(id){
  const e=db.expenses.find(e=>e.id===id);
  if(!confirm('確定要刪除「'+(e?e.name:'此費用')+'」嗎？'))return;
  // if linked to vendor, also update vendor
  if(e&&e.vendorId){
    const v=db.vendors.find(v=>v.id===e.vendorId);
    if(v){v.paid=0;v.unpaid=0;renderVendors();}
  }
  db.expenses=db.expenses.filter(e=>e.id!==id);
  renderExpenses();await saveData();
}

function openExpDetail(id){
  const e=db.expenses.find(e=>e.id===id);if(!e)return;
  const isLinked=!!e.vendorId;
  const bodyHtml=`
    ${isLinked?`<div style="font-size:11px;color:var(--accent);margin-bottom:10px;padding:6px 10px;background:var(--accent-l);border-radius:var(--r2)">🔗 此費用與廠商「${esc(db.vendors.find(v=>v.id===e.vendorId)?.name||'')}」連動，修改後廠商資料也會同步更新</div>`:''}
    <div class="frow"><div class="field" style="flex:1"><label>費用名稱</label><input type="text" id="em-name" value="${esc(e.name)}"></div></div>
    <div class="frow" style="margin-top:8px">
      <div class="field"><label>類別</label><select id="em-cat" onchange="handleCatChange(this)">${catOpts(e.cat)}</select></div>
      <div class="field"><label>✅ 已付</label><input type="number" id="em-paid" value="${e.paid||0}"></div>
      <div class="field"><label>⏳ 待付</label><input type="number" id="em-unpaid" value="${e.unpaid||0}"></div>
    </div>
    <div class="frow" style="margin-top:8px"><div class="field" style="flex:1"><label>備注</label><textarea id="em-note">${esc(e.note||'')}</textarea></div></div>
    <div style="margin-top:10px"><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px">附件${isLinked?'（與廠商共用）':''}</div>
    <div id="exp-files-${e.id}">${buildFileGrid(e.files,(idx)=>removeExpFile(e.id,idx),()=>addExpFile(e.id))}</div></div>`;
  openEditModal(e.name, bodyHtml, async()=>{
    const nn=document.getElementById('em-name').value.trim();if(nn)e.name=nn;
    e.cat=document.getElementById('em-cat').value;
    e.paid=parseFloat(document.getElementById('em-paid').value)||0;
    e.unpaid=parseFloat(document.getElementById('em-unpaid').value)||0;
    e.note=document.getElementById('em-note').value;
    // sync back to vendor
    if(e.vendorId){
      const v=db.vendors.find(v=>v.id===e.vendorId);
      if(v){v.paid=e.paid;v.unpaid=e.unpaid;v.note=e.note;v.name=e.name;renderVendors();}
    }
    renderExpenses();await saveData();
  });
}

async function addExpFile(id){
  pickFiles(async results=>{
    const e=db.expenses.find(e=>e.id===id);if(!e)return;
    if(!e.files)e.files=[];e.files.push(...results);
    // sync to vendor
    if(e.vendorId){const v=db.vendors.find(v=>v.id===e.vendorId);if(v){v.files=[...e.files];renderVendors();}}
    renderExpenses();
    const el=document.getElementById('exp-files-'+id);
    if(el)el.innerHTML=buildFileGrid(e.files,`(idx)=>{removeExpFile(${id},idx)}`,`()=>{addExpFile(${id})}`);
    await saveData();
  });
}
async function removeExpFile(id,idx){
  if(!confirm('確定要刪除此附件嗎？'))return;
  const e=db.expenses.find(e=>e.id===id);if(!e||!e.files)return;
  e.files.splice(idx,1);
  if(e.vendorId){const v=db.vendors.find(v=>v.id===e.vendorId);if(v){v.files=[...e.files];renderVendors();}}
  renderExpenses();
  const el=document.getElementById('exp-files-'+id);
  if(el)el.innerHTML=buildFileGrid(e.files,(idx)=>removeExpFile(id,idx),()=>addExpFile(id));
  await saveData();
}

function renderExpenses(){
  const tp=db.expenses.reduce((s,e)=>s+(e.paid||0),0);
  const tu=db.expenses.reduce((s,e)=>s+(e.unpaid||0),0);
  document.getElementById('b-paid').textContent='$'+tp.toLocaleString();
  document.getElementById('b-unpaid').textContent='$'+tu.toLocaleString();
  document.getElementById('b-total').textContent='$'+(tp+tu).toLocaleString();
  const list=document.getElementById('expense-list');
  if(!db.expenses.length){list.innerHTML='<div class="empty"><div class="emoji">💵</div>還沒有費用</div>';return}
  list.innerHTML=db.expenses.map(e=>{
    const paid=e.paid||0,unpaid=e.unpaid||0;
    const vColor=e.vendorId?getVendorColor(e.vendorId):null;
    return`<div class="item-card"${vColor?` style="border-left:4px solid ${vColor}"`:''}> 
      <div class="item-row" onclick="openExpDetail(${e.id})" style="cursor:pointer">
        <div class="item-body">
          <div class="item-title">${esc(e.name)}${e.vendorId?'<span style="font-size:9px;color:var(--text3);margin-left:5px">🔗廠商</span>':''}</div>
          <div class="item-sub">
            <span class="tag">${e.cat}</span>
            ${paid?`<span style="font-size:10px;color:var(--green)">✅ $${paid.toLocaleString()}</span>`:''}
            ${unpaid?`<span style="font-size:10px;color:var(--accent)">⏳ $${unpaid.toLocaleString()}</span>`:''}
            ${e.note?'<span class="tag">備注</span>':''}
            ${(e.files||[]).length?`<span class="tag">📎 ${e.files.length}</span>`:''}
          </div>
        </div>
        <div style="font-family:'Playfair Display',serif;font-size:15px;color:var(--text);white-space:nowrap;flex-shrink:0">$${(paid+unpaid).toLocaleString()}</div>
        ${!e.vendorId?`<button class="btn-del" onclick="event.stopPropagation();deleteExpense(${e.id})">✕</button>`:''}
      </div>
    </div>`;
  }).join('');
}

    t.cat=document.getElementById('em-cat').value;t.due=document.getElementById('em-due').value;
    t.priority=document.getElementById('em-pri').value;t.note=document.getElementById('em-note').value;
    renderTodos();await saveData();
  });
}
async function addTodoFile(id){
  pickFiles(async results=>{
    const t=db.todos.find(t=>t.id===id);if(!t)return;if(!t.files)t.files=[];t.files.push(...results);
    renderTodos();const el=document.getElementById('todo-files-'+id);

    await saveData();
  });
}
async function removeTodoFile(id,idx){
  if(!confirm('確定要刪除此附件嗎？'))return;
  const t=db.todos.find(t=>t.id===id);if(!t||!t.files)return;t.files.splice(idx,1);
  renderTodos();const el=document.getElementById('todo-files-'+id);
  if(el)el.innerHTML=buildFileGrid(t.files,(idx)=>removeTodoFile(id,idx),()=>addTodoFile(id));
  await saveData();
}
function renderTodos(){
  const list=document.getElementById('todo-list');
  const arr=[...db.todos.filter(t=>!t.done),...db.todos.filter(t=>t.done)];
  if(!arr.length){list.innerHTML='<div class="empty"><div class="emoji">🌸</div>還沒有待辦事項</div>';updateProgress();return}
  list.innerHTML=arr.map(t=>`
    <div class="item-card">
      <div class="item-row">
        <input type="checkbox" style="width:15px;height:15px;accent-color:var(--green);cursor:pointer;flex-shrink:0" ${t.done?'checked':''} onchange="toggleDone(${t.id})">
        <div class="item-body" onclick="openTodoDetail(${t.id})" style="cursor:pointer">
          <div class="item-title${t.done?' done':''}">${esc(t.text)}</div>
          <div class="item-sub">
            <span class="tag">${t.cat}</span>
            ${t.due?`<span class="tag">📅 ${t.due}</span>`:''}
            ${t.priority==='urgent'?'<span class="tag urgent">緊急</span>':''}
            ${t.done?'<span class="tag done-t">✓</span>':''}
            ${t.note?'<span class="tag">備注</span>':''}
            ${(t.files||[]).length?`<span class="tag">📎 ${t.files.length}</span>`:''}
          </div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="openTodoDetail(${t.id})" style="flex-shrink:0;font-size:11px">詳情</button>
        <button class="btn-del" onclick="deleteTodo(${t.id})">✕</button>
      </div>
    </div>`).join('');
  updateProgress();
}
function updateProgress(){
  const done=db.todos.filter(t=>t.done).length,total=db.todos.length,pct=total?Math.round(done/total*100):0;
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('progressLbl').textContent=`${done} / ${total} 完成（${pct}%）`;
}

// ── GUESTS ────────────────────────────────────────────

  db.guests.push({id:Date.now(),name,side:document.getElementById('g-side').value,table:document.getElementById('g-table').value,rsvp:document.getElementById('g-rsvp').value,diet:document.getElementById('g-diet').value,note:'',files:[]});
  ['g-name','g-table','g-diet'].forEach(id=>document.getElementById(id).value='');
  renderGuests();await saveData();

async function deleteGuest(id){

  if(!confirm('確定要刪除賓客「'+(g?g.name:'此賓客')+'」嗎？'))return;
  db.guests=db.guests.filter(g=>g.id!==id);renderGuests();await saveData();

async function addGuestFile(id){

async function removeGuestFile(id,idx){

// ── CALENDAR ──────────────────────────────────────────
function setView(v){calView=v;['month','week','list'].forEach(x=>document.getElementById('vt-'+x).classList.toggle('active',x===v));renderCalendar()}
function changeMonth(d){calMonth+=d;if(calMonth>11){calMonth=0;calYear++}if(calMonth<0){calMonth=11;calYear--}renderCalendar()}
function goToday(){const n=new Date();calYear=n.getFullYear();calMonth=n.getMonth();selDate=dateKey(calYear,calMonth,n.getDate());renderCalendar();showEvPanel(selDate)}
function jumpYear(){calYear=parseInt(document.getElementById('cal-year-sel').value);renderCalendar()}
function jumpMonth(){calMonth=parseInt(document.getElementById('cal-month-sel').value);renderCalendar()}
function updateCalJump(){
  const ySel=document.getElementById('cal-year-sel');const mSel=document.getElementById('cal-month-sel');if(!ySel||!mSel)return;
  const years=Array.from({length:10},(_,i)=>calYear-3+i);
  ySel.innerHTML=years.map(y=>`<option${y===calYear?' selected':''}>${y}</option>`).join('');
  const mns=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  mSel.innerHTML=mns.map((m,i)=>`<option value="${i}"${i===calMonth?' selected':''}>${m}</option>`).join('');
}
function getEvForDate(ds){
  const evs=(db.events||[]).filter(e=>e.date===ds);
  const todos=db.todos.filter(t=>t.due&&t.due.replace(/-/g,'/')===ds);
  const isW=db.weddingDate&&db.weddingDate.replace(/-/g,'/')===ds;
  const isR=db.registryDate&&db.registryDate.replace(/-/g,'/')===ds;
  return{evs,todos,isW,isR};
}
function renderCalendar(){
  const mns=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('cal-title').textContent=calYear+'年 '+mns[calMonth];
  updateCalJump();
  if(calView==='month')renderMonth();else if(calView==='week')renderWeek();else renderList();
}
function renderMonth(){
  const body=document.getElementById('cal-body');
  const today=new Date();today.setHours(0,0,0,0);
  const fd=new Date(calYear,calMonth,1).getDay(),dim=new Date(calYear,calMonth+1,0).getDate(),dip=new Date(calYear,calMonth,0).getDate();
  let h='<div class="cal-month-grid">';
  ['日','一','二','三','四','五','六'].forEach(d=>h+=`<div class="cal-dow">${d}</div>`);
  for(let i=fd-1;i>=0;i--)h+=`<div class="cal-cell other"><div class="cnum">${dip-i}</div></div>`;
  for(let d=1;d<=dim;d++){
    const ds=dateKey(calYear,calMonth,d),dt=new Date(calYear,calMonth,d);
    const isT=dt.getTime()===today.getTime(),isSel=selDate===ds;
    const{evs,todos,isW,isR}=getEvForDate(ds);
    let cls='cal-cell';if(isW)cls+=' wedding-d';else if(isR)cls+=' registry-d';if(isT)cls+=' today';if(isSel)cls+=' selected';
    const sorted=evs.sort((a,b)=>(a.start||'').localeCompare(b.start||''));
    const pills=[isW?`<div class="special-tag">💒婚禮</div>`:'',isR?`<div class="special-tag" style="background:var(--green)">📋登記</div>`:'',
      ...sorted.slice(0,2).map(e=>`<div class="ev-pill" style="background:${e.color||'var(--accent)'}">${e.start?e.start.slice(0,5)+' ':''}${esc(e.text)}</div>`),
      sorted.length>2?`<div style="font-size:9px;color:var(--text3)">+${sorted.length-2}</div>`:'',
      ...todos.slice(0,1).map(t=>`<div class="ev-pill todo-p">✅ ${esc(t.text)}</div>`)].filter(Boolean);
    h+=`<div class="${cls}" onclick="selectCalDate('${ds}')"><div class="cnum">${d}</div>${pills.join('')}</div>`;
  }
  const rem=(fd+dim)%7===0?0:7-(fd+dim)%7;for(let d=1;d<=rem;d++)h+=`<div class="cal-cell other"><div class="cnum">${d}</div></div>`;
  h+='</div>';body.innerHTML=h;
}
function renderWeek(){
  const body=document.getElementById('cal-body');
  const today=new Date();today.setHours(0,0,0,0);
  const ref=selDate?parseDate(selDate):new Date(),sow=new Date(ref);sow.setDate(ref.getDate()-ref.getDay());
  const days=Array.from({length:7},(_,i)=>{const d=new Date(sow);d.setDate(sow.getDate()+i);return d});
  const dows=['日','一','二','三','四','五','六'],hours=Array.from({length:24},(_,i)=>i);
  let h=`<div class="week-wrap"><div class="week-head"><div class="wh-cell" style="border-right:1px solid var(--border)"></div>`;
  days.forEach((d,i)=>{const isT=d.getTime()===today.getTime();h+=`<div class="wh-cell${isT?' today-c':''}"><div>${dows[i]}</div><div class="wdate">${d.getDate()}</div></div>`;});
  h+=`</div><div class="week-body"><div class="wtime-col">${hours.map(h=>`<div class="wtime">${String(h).padStart(2,'0')}:00</div>`).join('')}</div>`;
  days.forEach(d=>{
    const ds=dateKey(d.getFullYear(),d.getMonth(),d.getDate());
    const{evs,isW,isR}=getEvForDate(ds);
    const slots=hours.map(()=>'<div class="wslot"></div>').join('');
    const wevs=evs.filter(e=>e.start).map(e=>{const[sh,sm]=e.start.split(':').map(Number);const top=sh*38+Math.floor(sm/60*38);let ht=38;if(e.end){const[eh,em]=e.end.split(':').map(Number);ht=Math.max(18,(eh*60+em-sh*60-sm)/60*38);}return`<div class="wev" style="top:${top}px;height:${ht}px;background:${e.color||'var(--accent)'}" onclick="event.stopPropagation();selectCalDate('${ds}')">${e.start.slice(0,5)} ${esc(e.text)}</div>`;}).join('');
    const sp=(isW||isR)?`<div style="background:${isW?'var(--accent)':'var(--green)'};color:#fff;font-size:9px;padding:2px 4px;position:absolute;top:0;left:2px;right:2px;border-radius:2px;z-index:3">${isW?'💒婚禮':'📋登記'}</div>`:'';
    h+=`<div class="wday-col" onclick="selectCalDate('${ds}')" style="position:relative">${sp}${slots}${wevs}</div>`;
  });
  h+=`</div></div>`;body.innerHTML=h;
}
function renderList(){
  const body=document.getElementById('cal-body');
  const allEvs=[];
  for(let mi=0;mi<3;mi++){const y=calMonth+mi>11?calYear+1:calYear,m=(calMonth+mi)%12,dim=new Date(y,m+1,0).getDate();
    for(let d=1;d<=dim;d++){const ds=dateKey(y,m,d),{evs,todos,isW,isR}=getEvForDate(ds);if(evs.length||todos.length||isW||isR)allEvs.push({ds,evs,todos,isW,isR});}}
  if(!allEvs.length){body.innerHTML='<div class="empty"><div class="emoji">📅</div>未來3個月沒有行程</div>';return}
  const dows=['日','一','二','三','四','五','六'];
  let h='<div style="padding:4px 0">';
  allEvs.forEach(({ds,evs,todos,isW,isR})=>{
    const dt=parseDate(ds),label=`${ds.replace(/\//g,'-')} ${dows[dt.getDay()]}`;
    h+=`<div class="list-date-h">${label}</div>`;
    if(isW)h+=`<div class="list-ev"><div class="list-ev-bar" style="background:var(--accent)"></div><div><div class="list-ev-title">💒 婚禮</div></div></div>`;
    if(isR)h+=`<div class="list-ev"><div class="list-ev-bar" style="background:var(--green)"></div><div><div class="list-ev-title">📋 登記</div></div></div>`;
    evs.sort((a,b)=>(a.start||'').localeCompare(b.start||'')).forEach(e=>{
      h+=`<div class="list-ev" onclick="selectCalDate('${ds}')"><div class="list-ev-bar" style="background:${e.color||'var(--accent)'}"></div><div><div class="list-ev-title">${e.start?`<span style="color:var(--text3);font-size:10px">${e.start}${e.end?'–'+e.end:''} </span>`:''}${esc(e.text)}</div>${e.note?`<div class="list-ev-meta">📝 ${esc(e.note)}</div>`:''}</div></div>`;
    });
    todos.forEach(t=>h+=`<div class="list-ev"><div class="list-ev-bar" style="background:var(--green)"></div><div><div class="list-ev-title${t.done?' done':''}">✅ ${esc(t.text)}</div></div></div>`);
  });
  h+='</div>';body.innerHTML=h;
}
function selectCalDate(ds){
  selDate=ds;if(calView==='month')renderMonth();else if(calView==='week'){const d=parseDate(ds);calYear=d.getFullYear();calMonth=d.getMonth();renderWeek();}
  showEvPanel(ds);
}
function closeEvPanel(){document.getElementById('ev-panel').style.display='none';selDate=null;if(calView==='month')renderMonth()}
function showEvPanel(ds){
  const panel=document.getElementById('ev-panel'),title=document.getElementById('ev-panel-title'),list=document.getElementById('ev-list'),form=document.getElementById('ev-add-form');
  panel.style.display='block';
  const dt=parseDate(ds),dows=['日','一','二','三','四','五','六'];
  title.textContent=ds.replace(/\//g,'-')+' ('+dows[dt.getDay()]+')';
  form.style.display='block';initColorPicker();
  const{evs,todos,isW,isR}=getEvForDate(ds);
  if(!evs.length&&!todos.length&&!isW&&!isR){list.innerHTML='<div style="padding:9px 14px;font-size:12px;color:var(--text3)">這天還沒有行程</div>';return}
  const sorted=evs.sort((a,b)=>(a.start||'').localeCompare(b.start||''));
  list.innerHTML=[
    isW?`<div class="ev-item"><div class="ev-dot" style="background:var(--accent)"></div><div class="ev-body"><div class="ev-title">💒 婚禮</div></div></div>`:'',
    isR?`<div class="ev-item"><div class="ev-dot" style="background:var(--green)"></div><div class="ev-body"><div class="ev-title">📋 登記</div></div></div>`:'',
    ...sorted.map(e=>`<div class="ev-item" onclick="openCalEvEdit(${e.id},'${ds}')">
      <div class="ev-dot" style="background:${e.color||'var(--accent)'}"></div>
      <div class="ev-body">
        <div class="ev-title">${e.start?`<span style="color:var(--text3);font-size:10px">${e.start}${e.end?'–'+e.end:''} </span>`:''}${esc(e.text)}</div>
        ${e.note?`<div class="ev-note">📝 ${esc(e.note)}</div>`:''}
      </div>
      <div class="ev-actions-row">
        <button class="ev-edit-b" onclick="event.stopPropagation();openCalEvEdit(${e.id},'${ds}')">✏️</button>
        <button class="btn-del" onclick="event.stopPropagation();deleteCalEv(${e.id})">✕</button>
      </div>
    </div>`),
    ...todos.map(t=>`<div class="ev-item"><div class="ev-dot" style="background:var(--green)"></div><div class="ev-body"><div class="ev-title${t.done?' done':''}">✅ ${esc(t.text)}</div></div></div>`)
  ].filter(Boolean).join('');
}
function initColorPicker(){
  const p=document.getElementById('ev-color-picker');if(!p)return;
  p.innerHTML=EV_COLORS.map(c=>`<div class="cswatch${c===selColor?' sel':''}" style="background:${c}" onclick="selColor='${c}';this.parentElement.querySelectorAll('.cswatch').forEach(s=>s.classList.remove('sel'));this.classList.add('sel')"></div>`).join('');
}
function openCalEvEdit(id,ds){
  const e=(db.events||[]).find(e=>e.id===id);if(!e)return;
  window._editEvColor=e.color||EV_COLORS[0];
  const bodyHtml=`
    <div class="frow"><div class="field" style="flex:1"><label>行程名稱</label><input type="text" id="em-text" value="${esc(e.text)}"></div></div>
    <div class="frow" style="margin-top:8px">
      <div class="field"><label>開始</label><input type="time" id="em-start" value="${e.start||''}"></div>
      <div class="field"><label>結束</label><input type="time" id="em-end" value="${e.end||''}"></div>
    </div>
    <div class="frow" style="margin-top:8px"><div class="field" style="flex:1"><label>備注</label><textarea id="em-note">${esc(e.note||'')}</textarea></div></div>
    <div style="margin-top:10px"><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px">顏色</div>
    <div class="color-row">${EV_COLORS.map(c=>`<div class="cswatch${c===(e.color||EV_COLORS[0])?' sel':''}" style="background:${c}" onclick="window._editEvColor='${c}';this.parentElement.querySelectorAll('.cswatch').forEach(s=>s.classList.remove('sel'));this.classList.add('sel')"></div>`).join('')}</div></div>`;
  openEditModal(e.text,bodyHtml,async()=>{
    const nt=document.getElementById('em-text').value.trim();if(nt)e.text=nt;
    e.start=document.getElementById('em-start').value;e.end=document.getElementById('em-end').value;
    e.note=document.getElementById('em-note').value;e.color=window._editEvColor||e.color;
    renderCalendar();showEvPanel(ds);await saveData();
  });
}
async function addCalEvent(){
  if(!selDate)return;const text=document.getElementById('ev-text').value.trim();if(!text)return;
  if(!db.events)db.events=[];
  db.events.push({id:Date.now(),date:selDate,text,type:document.getElementById('ev-type').value,color:selColor,start:document.getElementById('ev-start').value,end:document.getElementById('ev-end').value,note:document.getElementById('ev-note').value.trim()});
  document.getElementById('ev-text').value='';document.getElementById('ev-start').value='';document.getElementById('ev-end').value='';document.getElementById('ev-note').value='';
  renderCalendar();showEvPanel(selDate);await saveData();
}
async function deleteCalEv(id){
  const e=(db.events||[]).find(e=>e.id===id);
  if(!confirm('確定要刪除行程「'+(e?e.text:'此行程')+'」嗎？'))return;
  db.events=db.events.filter(e=>e.id!==id);renderCalendar();if(selDate)showEvPanel(selDate);await saveData();
}

function renderAll(){renderTodos();renderExpenses();renderVendors();renderGuests();renderCalendar()}
loadData();
