<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>婚禮規劃 💍</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--rose:#c97b63;--blush:#e8c5b0;--sage:#7fa87f;--cream:#fdf6ee;--light:#f5ece3;--dark:#3a2e28;--mid:#7a6458;--white:#fffdf9;--shadow:0 2px 18px rgba(58,46,40,.09);--red:#e74c3c;--gold:#b7860a}
body{font-family:'Noto Sans TC',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh}
header{background:var(--white);border-bottom:1px solid var(--blush);padding:14px 16px 0;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.header-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
h1{font-family:'Noto Serif TC',serif;font-size:19px;color:var(--rose);letter-spacing:2px}
.sync-badge{margin-left:auto;font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--blush);background:var(--light);color:var(--mid);display:flex;align-items:center;gap:4px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#ccc;transition:background .3s}
.sync-dot.ok{background:var(--sage)}.sync-dot.err{background:var(--red)}.sync-dot.loading{background:var(--blush);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.date-banners{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.date-banner{background:var(--light);border-radius:10px;padding:8px 12px;cursor:pointer;border:1px solid rgba(232,197,176,.5);transition:background .2s}
.date-banner:hover{background:var(--blush)}
.db-label{font-size:10px;color:var(--mid);margin-bottom:2px}
.db-val{font-family:'Noto Serif TC',serif;font-size:13px;color:var(--dark)}
.db-countdown{font-size:11px;color:var(--rose);font-weight:500;margin-top:1px}
nav{display:flex;overflow-x:auto}
nav button{flex:1;min-width:68px;padding:9px 4px;border:none;background:transparent;font-family:'Noto Sans TC',sans-serif;font-size:13px;color:var(--mid);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
nav button.active{color:var(--rose);border-bottom-color:var(--rose);font-weight:500}
.content{padding:16px;max-width:680px;margin:0 auto}
.tab-panel{display:none}.tab-panel.active{display:block}
.card{background:var(--white);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid rgba(232,197,176,.3)}
.section-title{font-family:'Noto Serif TC',serif;font-size:14px;color:var(--rose);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.input-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
input[type=text],input[type=number],input[type=date],select,textarea{flex:1;min-width:100px;padding:8px 11px;border:1px solid var(--blush);border-radius:8px;font-family:'Noto Sans TC',sans-serif;font-size:13px;color:var(--dark);background:var(--cream);outline:none;transition:border .2s}
input:focus,select:focus,textarea:focus{border-color:var(--rose);background:var(--white)}
textarea{resize:vertical;min-height:54px}
.btn{padding:8px 15px;border:none;border-radius:8px;font-family:'Noto Sans TC',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-primary{background:var(--rose);color:#fff}.btn-primary:hover{background:#b56a52}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-del{background:transparent;color:#ccc;border:none;padding:4px 6px;font-size:14px;cursor:pointer;line-height:1;transition:color .2s}.btn-del:hover{color:var(--red)}

/* ── SHARED EXPANDABLE CARD ── */
.ex-card{background:var(--white);border:1px solid rgba(232,197,176,.4);border-radius:12px;margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow)}
.ex-main{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.ex-main:hover{background:rgba(232,197,176,.08)}
.ex-body{flex:1;min-width:0}
.ex-arrow{font-size:16px;color:var(--mid);transition:transform .2s;flex-shrink:0}
.ex-arrow.open{transform:rotate(90deg)}
.ex-detail{display:none;padding:0 14px 14px;border-top:1px solid var(--light)}
.ex-detail.open{display:block}
.ex-field{margin-top:10px}
.ex-field label{font-size:11px;color:var(--mid);display:block;margin-bottom:4px}
.ex-field input,.ex-field select,.ex-field textarea{width:100%;min-width:unset}
.ex-save{margin-top:10px;width:100%}
.ex-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.ex-col{flex:1;min-width:80px}
.ex-col label{font-size:11px;color:var(--mid);display:block;margin-bottom:4px}
.ex-col input,.ex-col select{width:100%;min-width:unset}

/* ── TODOS ── */
.todo-cb{width:18px;height:18px;min-width:18px;accent-color:var(--sage);cursor:pointer;flex-shrink:0}
.todo-title{font-size:14px;line-height:1.5;word-break:break-all}
.todo-title.done{text-decoration:line-through;color:var(--mid);opacity:.5}
.tags{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--light);color:var(--mid)}
.tag.urgent{background:#fdecea;color:var(--red)}.tag.done-tag{background:#eaf4ea;color:var(--sage)}
.progress-wrap{background:var(--light);border-radius:10px;height:7px;margin:10px 0 4px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--sage),var(--rose));border-radius:10px;transition:width .5s}
.progress-lbl{font-size:12px;color:var(--mid);text-align:right}
/* photos */
.photo-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.photo-wrap{position:relative;width:72px;height:72px;border-radius:8px;overflow:hidden;border:1px solid var(--blush);flex-shrink:0}
.photo-wrap img{width:100%;height:100%;object-fit:cover}
.photo-del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.photo-add{width:72px;height:72px;border:2px dashed var(--blush);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:var(--mid);gap:3px;background:var(--cream);transition:border-color .2s;flex-shrink:0}
.photo-add:hover{border-color:var(--rose);color:var(--rose)}

/* ── BUDGET ── */
.budget-summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.bsum-box{border-radius:12px;padding:14px 16px;text-align:center}
.bsum-box.paid{background:linear-gradient(135deg,#eaf4ea,#f0f8f0)}
.bsum-box.pending{background:linear-gradient(135deg,#fff8e1,#fffbf0)}
.bl{font-size:11px;color:var(--mid);margin-bottom:4px}
.ba{font-family:'Noto Serif TC',serif;font-size:22px}
.bsum-box.paid .ba{color:var(--sage)}.bsum-box.pending .ba{color:var(--gold)}
.btotal-row{text-align:center;padding:10px 0 4px;font-size:13px;color:var(--mid)}
.btotal-row strong{font-family:'Noto Serif TC',serif;font-size:18px;color:var(--rose);margin-left:6px}
.exp-name{font-size:14px;word-break:break-all}
.exp-sub{font-size:11px;color:var(--mid);margin-top:2px}
.exp-amt{font-size:15px;font-weight:500;white-space:nowrap;margin-right:4px}
.exp-amt.paid{color:var(--sage)}.exp-amt.unpaid{color:var(--gold)}
.exp-badge{font-size:10px;padding:2px 8px;border-radius:8px;white-space:nowrap;cursor:pointer;border:none;font-family:'Noto Sans TC',sans-serif}
.exp-badge.paid{background:#eaf4ea;color:var(--sage)}.exp-badge.unpaid{background:#fff8e1;color:var(--gold)}

/* ── VENDOR ── */
.vendor-name-txt{font-weight:500;font-size:15px;flex:1;min-width:0;word-break:break-all}
.vendor-type-tag{font-size:11px;padding:3px 10px;border-radius:10px;background:var(--blush);color:var(--dark);flex-shrink:0}
.vstatus{display:inline-block;font-size:11px;padding:3px 10px;border-radius:10px}
.vstatus-confirmed{background:#eaf4ea;color:var(--sage)}.vstatus-pending{background:#fff8e1;color:var(--gold)}.vstatus-cancelled{background:#fdecea;color:var(--red)}
.vendor-preview{font-size:12px;color:var(--mid);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── GUEST ── */
.guest-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat-box{background:var(--light);border-radius:10px;padding:10px 6px;text-align:center}
.stat-box .num{font-family:'Noto Serif TC',serif;font-size:22px;color:var(--rose)}
.stat-box .lbl{font-size:11px;color:var(--mid)}
.g-name-txt{font-size:14px;flex:1}
.g-side-tag{font-size:11px;color:var(--mid)}
.g-preview{font-size:12px;color:var(--mid);margin-top:2px}
.rsvp-badge{font-size:11px;padding:3px 10px;border-radius:10px;flex-shrink:0}
.rsvp-yes{background:#eaf4ea;color:var(--sage)}.rsvp-no{background:#fdecea;color:var(--red)}.rsvp-pending{background:var(--light);color:var(--mid)}

.empty{text-align:center;padding:28px;color:var(--mid);font-size:13px}
.empty .emoji{font-size:30px;margin-bottom:8px}
#loadingOverlay{position:fixed;inset:0;background:rgba(253,246,238,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px}
#loadingOverlay .spinner{width:36px;height:36px;border:3px solid var(--blush);border-top-color:var(--rose);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loadingOverlay p{font-size:14px;color:var(--mid)}
@media(max-width:400px){.guest-stats{grid-template-columns:repeat(2,1fr)}}

/* ── CALENDAR ── */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-title{font-family:'Noto Serif TC',serif;font-size:16px;color:var(--rose)}
.cal-nav{background:transparent;border:1px solid var(--blush);border-radius:8px;padding:6px 12px;font-size:14px;color:var(--mid);cursor:pointer}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px}
.cal-dow{text-align:center;font-size:11px;color:var(--mid);padding:4px 0;font-weight:500}
.cal-day{
  aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding-top:6px;border-radius:8px;cursor:pointer;transition:background .15s;position:relative;
  font-size:13px;
}
.cal-day:hover{background:var(--light)}
.cal-day.other-month{color:var(--blush)}
.cal-day.today{background:var(--light);font-weight:700;color:var(--rose)}
.cal-day.selected{background:var(--rose)!important;color:#fff!important}
.cal-day.selected:hover{background:#b56a52!important}
.cal-day.has-event::after{content:'';width:5px;height:5px;border-radius:50%;background:var(--sage);position:absolute;bottom:4px}
.cal-day.selected.has-event::after{background:#fff}
.cal-day.wedding-day{background:linear-gradient(135deg,var(--rose),var(--blush))!important;color:#fff!important;font-weight:700}
.cal-day.registry-day{background:linear-gradient(135deg,var(--sage),#b5d5b5)!important;color:#fff!important;font-weight:700}
.cal-dots{display:flex;gap:2px;position:absolute;bottom:3px;left:50%;transform:translateX(-50%)}
.cal-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

.event-panel{background:var(--white);border-radius:12px;padding:16px;box-shadow:var(--shadow);border:1px solid rgba(232,197,176,.3)}
.event-panel-title{font-family:'Noto Serif TC',serif;font-size:14px;color:var(--rose);margin-bottom:12px}
.event-item{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--light)}
.event-item:last-child{border-bottom:none}
.event-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.event-body{flex:1;min-width:0}
.event-text{font-size:13px;word-break:break-all}
.event-text.editing{display:none}
.event-edit-input{width:100%;padding:4px 8px;border:1px solid var(--blush);border-radius:6px;font-size:13px;font-family:'Noto Sans TC',sans-serif;background:var(--cream)}
.event-meta{font-size:11px;color:var(--mid);margin-top:2px}
.event-actions{display:flex;gap:4px;align-items:center;flex-shrink:0}
.ev-edit-btn{background:transparent;border:1px solid var(--blush);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--mid);cursor:pointer}
.ev-edit-btn:hover{background:var(--light)}
.ev-save-btn{background:var(--rose);border:none;border-radius:6px;padding:3px 8px;font-size:11px;color:#fff;cursor:pointer;display:none}

.add-event-form{margin-top:14px;padding-top:14px;border-top:1px solid var(--light)}

/* color picker */
.color-picker{display:flex;gap:6px;margin:8px 0;flex-wrap:wrap}
.color-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;flex-shrink:0}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch.selected{border-color:var(--dark);transform:scale(1.15)}

.ev-type-sel{font-size:12px;padding:6px 8px;border:1px solid var(--blush);border-radius:8px;background:var(--cream);color:var(--dark);font-family:'Noto Sans TC',sans-serif}


/* ── SIDEBAR ── */
#sidebar{
  position:fixed;top:0;left:-280px;width:260px;height:100vh;
  background:var(--white);z-index:200;transition:left .3s ease;
  box-shadow:4px 0 24px rgba(58,46,40,.15);
  display:flex;flex-direction:column;
  border-right:1px solid var(--blush);
}
#sidebar.open{left:0}
.sb-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 16px 16px;border-bottom:1px solid var(--blush);
  flex-shrink:0;
}
.sb-close{background:transparent;border:none;font-size:18px;color:var(--mid);cursor:pointer;padding:4px}
#sidebar nav{display:flex;flex-direction:column;padding:12px 0;overflow-y:auto;flex:1}
#sidebar nav button{
  text-align:left;padding:14px 20px;border:none;background:transparent;
  font-family:'Noto Sans TC',sans-serif;font-size:14px;color:var(--mid);
  cursor:pointer;transition:all .15s;border-left:3px solid transparent;
  white-space:nowrap;
}
#sidebar nav button:hover{background:var(--light);color:var(--dark)}
#sidebar nav button.active{
  color:var(--rose);background:var(--light);
  border-left-color:var(--rose);font-weight:500;
}
.hamburger{
  background:transparent;border:none;font-size:22px;color:var(--mid);
  cursor:pointer;padding:4px 8px;line-height:1;flex-shrink:0;
}

</style>
</head>
<body>
<div id="loadingOverlay"><div class="spinner"></div><p>載入婚禮資料中…</p></div>

<header>
  <div class="header-top"><button class="hamburger" onclick="openSidebar()">☰</button>
    <span style="font-size:24px">💍</span>
    <h1>婚禮規劃</h1>
    <div class="sync-badge"><div class="sync-dot loading" id="syncDot"></div><span id="syncLabel">同步中</span></div>
  </div>
  <div class="date-banners">
    <div class="date-banner" onclick="editDate('wedding')">
      <div class="db-label">💒 婚禮日期</div>
      <div class="db-val" id="weddingDateVal">點擊設定</div>
      <div class="db-countdown" id="weddingCountdown"></div>
    </div>
    <div class="date-banner" onclick="editDate('registry')">
      <div class="db-label">📋 登記日期</div>
      <div class="db-val" id="registryDateVal">點擊設定</div>
      <div class="db-countdown" id="registryCountdown"></div>
    </div>
  </div>
  <div id="sidebar-overlay" onclick="closeSidebar()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199"></div>
  <div id="sidebar">
    <div class="sb-header">
      <div style="font-family:'Noto Serif TC',serif;font-size:16px;color:var(--rose)">💍 婚禮規劃</div>
      <button onclick="closeSidebar()" class="sb-close">✕</button>
    </div>
    <nav>
      <button class="active" onclick="switchTab('todo',this)">✅ 待辦事項</button>
      <button onclick="switchTab('budget',this)">💰 費用明細</button>
      <button onclick="switchTab('vendor',this)">🏪 廠商資訊</button>
      <button onclick="switchTab('guest',this)">👥 賓客名單</button>
      <button onclick="switchTab('calendar',this)">📅 行事曆</button>
    </nav>
  </div>
</header>

<div class="content">
  <!-- TODO -->
  <div id="tab-todo" class="tab-panel active">
    <div class="card">
      <div class="section-title">📋 新增待辦</div>
      <div class="input-row">
        <input type="text" id="todo-text" placeholder="待辦事項名稱">
        <select id="todo-cat" onchange="handleCatChange(this,'todo-cat')"></select>
      </div>
      <div class="input-row">
        <input type="date" id="todo-due">
        <select id="todo-priority"><option value="">一般</option><option value="urgent">緊急</option></select>
        <button class="btn btn-primary" onclick="addTodo()">新增</button>
      </div>
    </div>
    <div class="card">
      <div class="section-title">📌 完成進度</div>
      <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
      <div class="progress-lbl" id="progressLbl">0 / 0 完成</div>
    </div>
    <div id="todo-list"></div>
  </div>

  <!-- BUDGET -->
  <div id="tab-budget" class="tab-panel">
    <div class="card">
      <div class="budget-summary">
        <div class="bsum-box paid"><div class="bl">✅ 已付總計</div><div class="ba" id="b-paid">$0</div></div>
        <div class="bsum-box pending"><div class="bl">⏳ 待付總計</div><div class="ba" id="b-unpaid">$0</div></div>
      </div>
      <div class="btotal-row">所有費用合計<strong id="b-total">$0</strong></div>
    </div>
    <div class="card">
      <div class="section-title">➕ 新增費用</div>
      <div class="input-row">
        <input type="text" id="exp-name" placeholder="費用名稱（例：婚攝Fanson）">
        <select id="exp-cat" onchange="handleCatChange(this,'exp-cat')"></select>
      </div>
      <div class="input-row">
        <div style="flex:1;min-width:100px"><label style="font-size:11px;color:var(--mid);display:block;margin-bottom:4px">✅ 已付金額</label><input type="number" id="exp-paid" placeholder="0"></div>
        <div style="flex:1;min-width:100px"><label style="font-size:11px;color:var(--mid);display:block;margin-bottom:4px">⏳ 待付金額</label><input type="number" id="exp-unpaid" placeholder="0"></div>
        <button class="btn btn-primary" style="align-self:flex-end" onclick="addExpense()">新增</button>
      </div>
    </div>
    <div class="card">
      <div class="section-title">📊 費用明細 <span style="font-size:11px;color:var(--mid);font-family:'Noto Sans TC'">(點項目可編輯)</span></div>
      <div id="expense-list"><div class="empty"><div class="emoji">💵</div>還沒有費用記錄</div></div>
    </div>
  </div>

  <!-- VENDOR -->
  <div id="tab-vendor" class="tab-panel">
    <div class="card">
      <div class="section-title">🏪 新增廠商</div>
      <div class="input-row">
        <input type="text" id="v-name" placeholder="廠商名稱">
        <select id="v-type" onchange="handleCatChange(this,'v-type')"></select>
      </div>
      <div class="input-row">
        <input type="text" id="v-contact" placeholder="聯絡人">
        <input type="text" id="v-phone" placeholder="電話">
        <input type="text" id="v-line" placeholder="LINE ID">
      </div>
      <div class="input-row">
        <select id="v-status"><option value="pending">洽談中</option><option value="confirmed">已確認</option><option value="cancelled">已取消</option></select>
        <button class="btn btn-primary" onclick="addVendor()">新增廠商</button>
      </div>
      <div class="input-row"><textarea id="v-note" placeholder="備注（價格、約定等）"></textarea></div>
    </div>
    <div id="vendor-list"></div>
  </div>

  <!-- GUEST -->
  <div id="tab-guest" class="tab-panel">
    <div class="card">
      <div class="guest-stats">
        <div class="stat-box"><div class="num" id="g-total">0</div><div class="lbl">總人數</div></div>
        <div class="stat-box"><div class="num" id="g-yes">0</div><div class="lbl">確認出席</div></div>
        <div class="stat-box"><div class="num" id="g-no">0</div><div class="lbl">無法出席</div></div>
        <div class="stat-box"><div class="num" id="g-pending">0</div><div class="lbl">待確認</div></div>
      </div>
    </div>
    <div class="card">
      <div class="section-title">👤 新增賓客</div>
      <div class="input-row">
        <input type="text" id="g-name" placeholder="賓客姓名">

    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',

// ── CALENDAR ──────────────────────────────────────────────────
let calYear=new Date().getFullYear();
let calMonth=new Date().getMonth();
let selectedDate=null;

const EVENT_COLORS=[
  '#c97b63','#7fa87f','#b7860a','#6b9cc7','#a67cb8',
  '#e07b7b','#5b9e9e','#d4956a','#7a6458','#4a8c6f'
];

function initColorPicker(){
  const picker=document.getElementById('ev-color-picker');
  if(!picker)return;
  picker.innerHTML=EVENT_COLORS.map(c=>
    `<div class="color-swatch${c===selectedColor?' selected':''}" style="background:${c}" onclick="selectColor('${c}')"></div>`
  ).join('');
}

function selectColor(c){
  selectedColor=c;
  document.querySelectorAll('.color-swatch').forEach(s=>{
    s.classList.toggle('selected', s.style.background===c||s.style.backgroundColor===c);
  });
}

function changeMonth(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}

function renderCalendar(){
  const months=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('cal-title').textContent=calYear+'年 '+months[calMonth];
  const grid=document.getElementById('cal-grid');
  const dows=['日','一','二','三','四','五','六'];
  const today=new Date();today.setHours(0,0,0,0);
  const weddingDs=db.weddingDate?db.weddingDate.replace(/-/g,'/'):null;
  const registryDs=db.registryDate?db.registryDate.replace(/-/g,'/'):null;
  let h=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const daysInPrev=new Date(calYear,calMonth,0).getDate();
  for(let i=firstDay-1;i>=0;i--) h+=`<div class="cal-day other-month">${daysInPrev-i}</div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=calYear+'/'+(String(calMonth+1).padStart(2,'0'))+'/'+String(d).padStart(2,'0');
    const dt=new Date(calYear,calMonth,d);
    const isToday=dt.getTime()===today.getTime();
    const isSelected=selectedDate===dateStr;
    const isWedding=weddingDs&&dateStr===weddingDs;
    const isRegistry=registryDs&&dateStr===registryDs;
    const dayEvs=(db.events||[]).filter(e=>e.date===dateStr);
    const hasTodo=db.todos.some(t=>t.due&&t.due.replace(/-/g,'/')===dateStr);
    let cls='cal-day';
    if(isWedding)cls+=' wedding-day';
    else if(isRegistry)cls+=' registry-day';
    else if(isToday)cls+=' today';
    if(isSelected)cls+=' selected';
    // colored dots
    let dotsHtml='';
    if(dayEvs.length||hasTodo){
      const dots=[...dayEvs.map(e=>`<div class="cal-dot" style="background:${e.color||'var(--sage)'}"></div>`),
        hasTodo?`<div class="cal-dot" style="background:var(--sage)"></div>`:''].join('');
      dotsHtml=`<div class="cal-dots">${dots}</div>`;
    }
    h+=`<div class="${cls}" onclick="selectDate('${dateStr}')">${d}${dotsHtml}</div>`;
  }
  const total=firstDay+daysInMonth;
  const rem=total%7===0?0:7-(total%7);
  for(let d=1;d<=rem;d++) h+=`<div class="cal-day other-month">${d}</div>`;
  grid.innerHTML=h;
}

function selectDate(dateStr){
  selectedDate=dateStr;

  renderDayEvents(dateStr);
  initColorPicker();
}

function renderDayEvents(dateStr){

            ${EVENT_COLORS.map(c=>`<div class="color-swatch${c===(e.color||'#c97b63')?' selected':''}" style="background:${c}" onclick="setEvColor(${e.id},'${c}')"></div>`).join('')}
          </div>
        </div>
        <div class="event-actions">
          <button class="ev-edit-btn" id="ev-edt-${e.id}" onclick="startEditEv(${e.id})">✏️ 編輯</button>
          <button class="ev-save-btn" id="ev-sav-${e.id}" onclick="saveEditEv(${e.id})">💾 存</button>
          <button class="btn-del" onclick="deleteCalEvent(${e.id})">✕</button>

    ...todoEvs.map(t=>`

          <div class="event-text">${esc(t.text)}${t.done?' ✓':''}</div>
          <div class="event-meta">待辦</div>
        </div>
      </div>`)
  ].join('');
}

async function loadData(){
  setSyncState('loading','載入中');
  try{
    const rows=await sbFetch('/rest/v1/wedding_data?key=eq.'+DB_ROW_KEY+'&select=value');
    if(rows&&rows.length){
      const p=rows[0].value;
      db={todos:[],expenses:[],vendors:[],guests:[],weddingDate:'',registryDate:'',cats:[...DEFAULT_CATS],...p};
      db.expenses=db.expenses.map(e=>{
        if(e.paid===undefined) return{...e,paid:e.status==='paid'?(e.amount||0):0,unpaid:e.status!=='paid'?(e.amount||0):0};
        return e;
      });
      lastSavedJSON=JSON.stringify(db);
    } else {
      db=JSON.parse(JSON.stringify(SEED));
      await saveData();
    }
    setSyncState('ok','已同步');
  }catch(e){
    console.error('load error',e);
    db=JSON.parse(JSON.stringify(SEED));
    setSyncState('err','載入失敗');
  }
  document.getElementById('loadingOverlay').style.display='none';
  renderAll();updateDateBanners();populateCatSelects();
  setInterval(pollData,8000);
}

async function saveData(){
  if(saving)return;
  saving=true; setSyncState('loading','儲存中');
  const timer=setTimeout(()=>{saving=false;},8000);
  try{
    const j=JSON.stringify(db);
    await sbFetch('/rest/v1/wedding_data','POST',{key:DB_ROW_KEY,value:db,updated_at:new Date().toISOString()});
    lastSavedJSON=j;
    setSyncState('ok','已同步');
  } catch(e){
    setSyncState('err','儲存失敗');
    console.error(e);
  } finally {
    clearTimeout(timer);
    saving=false;
  }
}

async function pollData(){
  if(saving)return;
  try{
    const rows=await sbFetch('/rest/v1/wedding_data?key=eq.'+DB_ROW_KEY+'&select=value,updated_at');
    if(rows&&rows.length){
      const j=JSON.stringify(rows[0].value);
      if(j!==lastSavedJSON){
        db={todos:[],expenses:[],vendors:[],guests:[],weddingDate:'',registryDate:'',cats:[...DEFAULT_CATS],...rows[0].value};
        lastSavedJSON=j;
        renderAll();updateDateBanners();populateCatSelects();
      }
    }
  }catch(e){}
}

  document.getElementById('tab-'+name).classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>{
    if(b.getAttribute('onclick')&&b.getAttribute('onclick').includes("'"+name+"'"))b.classList.add('active');
  });
  closeSidebar();
}

// ── DATES ──────────────────────────────────────────────────────
function editDate(type){
  const cur=type==='wedding'?db.weddingDate:db.registryDate;
  const val=prompt('設定'+(type==='wedding'?'婚禮':'登記')+'日期（格式：YYYY-MM-DD）',cur||'');
  if(val===null)return;
  if(type==='wedding')db.weddingDate=val.trim();else db.registryDate=val.trim();
  updateDateBanners();saveData();
}
function updateDateBanners(){
  banner('weddingDateVal','weddingCountdown',db.weddingDate,'婚禮');
  banner('registryDateVal','registryCountdown',db.registryDate,'登記');
}
function banner(vId,cId,ds,label){
  const v=document.getElementById(vId),c=document.getElementById(cId);
  if(!ds){v.textContent='點擊設定';c.textContent='';return;}
  v.textContent=ds.replace(/-/g,'/');
  const d=Math.ceil((new Date(ds)-new Date())/86400000);
  c.textContent=d>0?`距離${label}還有 ${d} 天`:d===0?`今天就是${label}！🎉`:`${label}已過 ${-d} 天`;
}

// ── EXPAND HELPER ──────────────────────────────────────────────
function toggleEx(id){
  const d=document.getElementById('ex-detail-'+id);
  const a=document.getElementById('ex-arrow-'+id);
  if(!d)return;
  d.classList.toggle('open');
  if(a)a.classList.toggle('open');
}

// ── TODOS ──────────────────────────────────────────────────────
async function addTodo(){
  const text=document.getElementById('todo-text').value.trim();if(!text)return;
  db.todos.push({id:Date.now(),text,cat:document.getElementById('todo-cat').value,due:document.getElementById('todo-due').value,priority:document.getElementById('todo-priority').value,done:false,note:'',photos:[]});
  document.getElementById('todo-text').value='';document.getElementById('todo-due').value='';
  renderTodos();await saveData();
}
async function toggleDone(id){
  const t=db.todos.find(t=>t.id===id);if(t){t.done=!t.done;renderTodos();await saveData();}
}
async function saveTodo(id){
  const t=db.todos.find(t=>t.id===id);if(!t)return;
  const nt=document.getElementById('td-title-'+id).value.trim();if(nt)t.text=nt;
  t.cat=document.getElementById('td-cat-'+id).value;
  t.due=document.getElementById('td-due-'+id).value;
  t.priority=document.getElementById('td-pri-'+id).value;
  t.note=document.getElementById('td-note-'+id).value;
  renderTodos();await saveData();
}
async function deleteTodo(id){
  if(!confirm('確定要刪除？'))return;
  db.todos=db.todos.filter(t=>t.id!==id);renderTodos();await saveData();
}
function addTodoPhoto(id){
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.multiple=true;
  inp.onchange=async(e)=>{
    const t=db.todos.find(t=>t.id===id);if(!t)return;if(!t.photos)t.photos=[];
    for(const f of e.target.files)t.photos.push(await toB64(f));
    renderTodos();await saveData();
  };inp.click();
}
async function removeTodoPhoto(tid,idx){
  const t=db.todos.find(t=>t.id===tid);if(t&&t.photos){t.photos.splice(idx,1);renderTodos();await saveData();}
}
function toB64(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f)})}

function renderTodos(){
  const list=document.getElementById('todo-list');
  const arr=[...db.todos.filter(t=>!t.done),...db.todos.filter(t=>t.done)];
  if(!arr.length){list.innerHTML='<div class="card"><div class="empty"><div class="emoji">🌸</div>還沒有待辦事項</div></div>';updateProgress();return;}
  list.innerHTML=arr.map(t=>{
    const photos=t.photos||[];
    return`<div class="ex-card">
      <div class="ex-main" onclick="toggleEx(${t.id})">
        <input type="checkbox" class="todo-cb" ${t.done?'checked':''} onclick="event.stopPropagation();toggleDone(${t.id})">
        <div class="ex-body">
          <div class="todo-title${t.done?' done':''}">${esc(t.text)}</div>
          <div class="tags">
            <span class="tag">${t.cat}</span>
            ${t.due?`<span class="tag">📅 ${t.due}</span>`:''}
            ${t.priority==='urgent'?'<span class="tag urgent">🔴 緊急</span>':''}
            ${t.done?'<span class="tag done-tag">✓ 完成</span>':''}
            ${t.note?'<span class="tag">📝 備注</span>':''}
            ${photos.length?`<span class="tag">🖼 ${photos.length}張</span>`:''}
          </div>
        </div>
        <span class="ex-arrow" id="ex-arrow-${t.id}">›</span>
        <button class="btn-del" onclick="event.stopPropagation();deleteTodo(${t.id})">✕</button>
      </div>
      <div class="ex-detail" id="ex-detail-${t.id}">
        <div class="ex-field"><label>事項名稱</label><input type="text" id="td-title-${t.id}" value="${esc(t.text)}"></div>
        <div class="ex-row">
          <div class="ex-col"><label>類別</label><select id="td-cat-${t.id}" onchange="handleInlineCat(this,'td-cat-${t.id}')">${catOpts(t.cat)}</select></div>
          <div class="ex-col"><label>截止日</label><input type="date" id="td-due-${t.id}" value="${t.due||''}"></div>
          <div class="ex-col"><label>優先度</label><select id="td-pri-${t.id}"><option value=""${!t.priority?' selected':''}>一般</option><option value="urgent"${t.priority==='urgent'?' selected':''}>緊急</option></select></div>
        </div>
        <div class="ex-field"><label>備注</label><textarea id="td-note-${t.id}" placeholder="詳細備注、合約內容、聯絡紀錄…">${esc(t.note||'')}</textarea></div>
        <div class="ex-field"><label>照片</label>
          <div class="photo-grid">
            ${photos.map((src,i)=>`<div class="photo-wrap"><img src="${src}"><button class="photo-del" onclick="removeTodoPhoto(${t.id},${i})">✕</button></div>`).join('')}
            <div class="photo-add" onclick="addTodoPhoto(${t.id})"><span style="font-size:22px">＋</span><span>加照片</span></div>
          </div>
        </div>
        <button class="btn btn-primary ex-save btn-sm" onclick="saveTodo(${t.id})">💾 儲存更改</button>
      </div>
    </div>`;
  }).join('');
  updateProgress();
}
function updateProgress(){
  const done=db.todos.filter(t=>t.done).length,total=db.todos.length,pct=total?Math.round(done/total*100):0;
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('progressLbl').textContent=`${done} / ${total} 完成（${pct}%）`;
}

// ── EXPENSES ──────────────────────────────────────────────────
async function addExpense(){
  const name=document.getElementById('exp-name').value.trim();
  if(!name)return;
  const paid=parseFloat(document.getElementById('exp-paid').value)||0;
  const unpaid=parseFloat(document.getElementById('exp-unpaid').value)||0;
  if(paid===0&&unpaid===0)return;
  db.expenses.push({id:Date.now(),name,cat:document.getElementById('exp-cat').value,paid,unpaid,note:''});
  document.getElementById('exp-name').value='';
  document.getElementById('exp-paid').value='';
  document.getElementById('exp-unpaid').value='';
  renderExpenses();await saveData();
}
async function saveExpense(id){
  const e=db.expenses.find(e=>e.id===id);if(!e)return;
  const nn=document.getElementById('ee-name-'+id).value.trim();if(nn)e.name=nn;
  e.cat=document.getElementById('ee-cat-'+id).value;
  e.paid=parseFloat(document.getElementById('ee-paid-'+id).value)||0;
  e.unpaid=parseFloat(document.getElementById('ee-unpaid-'+id).value)||0;
  e.note=document.getElementById('ee-note-'+id).value;
  renderExpenses();await saveData();
}
async function deleteExpense(id){
  db.expenses=db.expenses.filter(e=>e.id!==id);renderExpenses();await saveData();
}

function renderExpenses(){
  const totalPaid=db.expenses.reduce((s,e)=>s+(e.paid||0),0);
  const totalUnpaid=db.expenses.reduce((s,e)=>s+(e.unpaid||0),0);
  document.getElementById('b-paid').textContent='$'+totalPaid.toLocaleString();
  document.getElementById('b-unpaid').textContent='$'+totalUnpaid.toLocaleString();
  document.getElementById('b-total').textContent='$'+(totalPaid+totalUnpaid).toLocaleString();
  const list=document.getElementById('expense-list');
  if(!db.expenses.length){list.innerHTML='<div class="empty"><div class="emoji">💵</div>還沒有費用記錄</div>';return;}
  list.innerHTML=db.expenses.map(e=>{
    const paid=e.paid||0,unpaid=e.unpaid||0,total=paid+unpaid;
    const hasBoth=paid>0&&unpaid>0;
    return`<div class="ex-card">
      <div class="ex-main" onclick="toggleEx('e${e.id}')">
        <div class="ex-body">
          <div class="exp-name">${esc(e.name)}</div>
          <div class="exp-sub" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:3px">
            <span style="color:var(--mid);font-size:11px">${e.cat}</span>
            ${paid>0?`<span style="color:var(--sage);font-size:11px">✅ 已付 $${paid.toLocaleString()}</span>`:''}
            ${unpaid>0?`<span style="color:var(--gold);font-size:11px">⏳ 待付 $${unpaid.toLocaleString()}</span>`:''}
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:14px;font-weight:500;color:var(--dark)">$${total.toLocaleString()}</div>
          ${hasBoth?'<div style="font-size:10px;color:var(--mid)">合計</div>':unpaid>0?'<div class="exp-badge unpaid" style="margin-top:2px">待付</div>':'<div class="exp-badge paid" style="margin-top:2px">已付</div>'}
        </div>
        <span class="ex-arrow" id="ex-arrow-e${e.id}">›</span>
        <button class="btn-del" onclick="event.stopPropagation();deleteExpense(${e.id})">✕</button>
      </div>
      <div class="ex-detail" id="ex-detail-e${e.id}">
        <div class="ex-field"><label>費用名稱</label><input type="text" id="ee-name-${e.id}" value="${esc(e.name)}"></div>
        <div class="ex-row">
          <div class="ex-col"><label>類別</label><select id="ee-cat-${e.id}" onchange="handleInlineCat(this,'ee-cat-${e.id}')">${catOpts(e.cat)}</select></div>
        </div>
        <div class="ex-row">
          <div class="ex-col"><label>✅ 已付金額</label><input type="number" id="ee-paid-${e.id}" value="${paid}"></div>
          <div class="ex-col"><label>⏳ 待付金額</label><input type="number" id="ee-unpaid-${e.id}" value="${unpaid}"></div>
        </div>
        <div class="ex-field"><label>備注</label><textarea id="ee-note-${e.id}" placeholder="付款時間、合約備注…">${esc(e.note||'')}</textarea></div>
        <button class="btn btn-primary ex-save btn-sm" onclick="saveExpense(${e.id})">💾 儲存更改</button>
      </div>
    </div>`;
  }).join('');
}

// ── GUESTS ──────────────────────────────────────────────────
async function addGuest(){
  const name=document.getElementById('g-name').value.trim();if(!name)return;

  ['g-name','g-table','g-diet'].forEach(id=>document.getElementById(id).value='');
  renderGuests();await saveData();
}
async function saveGuest(id){
  const g=db.guests.find(g=>g.id===id);if(!g)return;
  const nn=document.getElementById('gg-name-'+id).value.trim();if(nn)g.name=nn;
  g.side=document.getElementById('gg-side-'+id).value;
  g.table=document.getElementById('gg-table-'+id).value;
  g.rsvp=document.getElementById('gg-rsvp-'+id).value;
  g.diet=document.getElementById('gg-diet-'+id).value;
  g.note=document.getElementById('gg-note-'+id).value;

}
async function deleteGuest(id){db.guests=db.guests.filter(g=>g.id!==id);renderGuests();await saveData();}

function populateCatSelects(){
  ['todo-cat','exp-cat','v-type'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    const cur=el.value;
    if(id==='v-type'){el.innerHTML=vtypeOpts(el.value||VTYPES[0]);}
    else{el.innerHTML=catOpts(cur)||catOpts('');}
  });
}

async function handleInlineCat(sel, elId){
  if(sel.value!=='＋新增類別')return;
  const name=prompt('新增類別名稱：','');
  if(!name||!name.trim()){sel.value=getCats()[0];return;}
  const trimmed=name.trim();
  if(!db.cats)db.cats=[...DEFAULT_CATS];
  if(!db.cats.includes(trimmed))db.cats.push(trimmed);
  sel.innerHTML=catOpts(trimmed);
  sel.value=trimmed;
  populateCatSelects();
  await saveData();
}

async function handleCatChange(sel, elId){
  if(sel.value!=='＋新增類別')return;
  const name=prompt('新增類別名稱：','');
  if(!name||!name.trim()){sel.value=getCats()[0];return;}
  const trimmed=name.trim();
  if(!db.cats)db.cats=[...DEFAULT_CATS];
  if(!db.cats.includes(trimmed))db.cats.push(trimmed);
  if(elId==='v-type')sel.innerHTML=vtypeOpts(trimmed);
  else sel.innerHTML=catOpts(trimmed);
  sel.value=trimmed;
  populateCatSelects();
  await saveData();
}

function renderAll(){renderTodos();renderExpenses();renderVendors();renderGuests();populateCatSelects();}
loadData();
</script>
