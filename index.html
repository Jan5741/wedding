<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>婚禮規劃</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f8f6;--bg3:#f0efe9;--border:#e5e3db;--border2:#ccc9be;
  --text:#1c1c1a;--text2:#5c5a54;--text3:#9a9890;
  --accent:#b8956a;--accent-l:#f5ede2;--green:#6a9e72;--green-l:#edf5ee;--red:#c0392b;
  --shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);--r:10px;--r2:6px;
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg2);color:var(--text);font-size:14px;min-height:100vh}
/* SIDEBAR */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:199}
#ov.on{display:block}
#sb{position:fixed;top:0;left:-210px;width:195px;height:100vh;background:var(--bg);border-right:1px solid var(--border);z-index:200;transition:left .25s ease;display:flex;flex-direction:column;box-shadow:4px 0 20px rgba(0,0,0,.08)}
#sb.on{left:0}
.sb-top{padding:16px 12px 10px;border-bottom:1px solid var(--border)}
.sb-logo{font-family:'Playfair Display',serif;font-size:14px;margin-bottom:10px}
.sb-d{font-size:11px;color:var(--text2);padding:5px 8px;background:var(--bg2);border-radius:var(--r2);margin-bottom:4px;cursor:pointer}
.sb-d:hover{background:var(--bg3)}
.sb-dl{color:var(--text3);font-size:10px}
.sb-dv{color:var(--text);font-weight:500;font-size:12px}
.sb-dc{color:var(--accent);font-size:10px}
.sb-nav{flex:1;padding:8px 6px;overflow-y:auto}
.sb-btn{display:flex;align-items:center;gap:8px;width:100%;padding:9px 10px;border:none;background:transparent;cursor:pointer;border-radius:var(--r2);color:var(--text2);font-family:'Noto Sans TC',sans-serif;font-size:12px;transition:all .15s;text-align:left;margin-bottom:2px}
.sb-btn:hover{background:var(--bg2);color:var(--text)}
.sb-btn.on{background:var(--accent-l);color:var(--accent);font-weight:500}
.sb-sync{padding:8px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text3)}
.dot{width:5px;height:5px;border-radius:50%;background:#ccc}
.dot.ok{background:var(--green)}.dot.err{background:var(--red)}.dot.spin{background:var(--accent);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;height:50px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px}
.hbg{background:transparent;border:none;font-size:20px;cursor:pointer;color:var(--text2);padding:5px;border-radius:var(--r2);line-height:1}
.hbg:hover{background:var(--bg2)}
.tb-title{font-family:'Playfair Display',serif;font-size:16px}
.chips{display:flex;gap:5px;margin-left:auto}
.chip{padding:3px 9px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;font-size:10px;color:var(--text2);cursor:pointer;white-space:nowrap}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip-cd{color:var(--accent);font-weight:500}
/* CONTENT */
.content{padding:16px;max-width:800px;margin:0 auto}
.tab{display:none}.tab.on{display:block}
/* CARDS */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.card-hd{font-family:'Playfair Display',serif;font-size:13px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.card-arr{font-size:12px;color:var(--text3);transition:transform .2s}
.card-arr.on{transform:rotate(90deg)}
.card-bd{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.card-bd.on{display:block}
/* INPUTS */
.fl{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.fl .f{flex:1;min-width:80px}
.f label{display:block;font-size:10px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
input,select,textarea{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r2);font-family:'Noto Sans TC',sans-serif;font-size:13px;color:var(--text);background:var(--bg2);outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--bg)}
textarea{resize:vertical;min-height:48px}
.btn{padding:7px 14px;border:none;border-radius:var(--r2);font-family:'Noto Sans TC',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:#9e7a52}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--text2)}.btn-g:hover{background:var(--bg2)}
.btn-s{padding:4px 10px;font-size:11px}
.btn-x{background:transparent;border:none;color:var(--border2);cursor:pointer;font-size:13px;padding:3px 5px;line-height:1}.btn-x:hover{color:var(--red)}
/* ITEMS */
.ic{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);margin-bottom:7px;overflow:hidden}
.ic:hover{box-shadow:var(--shadow)}
.ir{display:flex;align-items:center;gap:8px;padding:11px 13px;cursor:pointer}
.ib{flex:1;min-width:0}
.it{font-size:13px;color:var(--text);line-height:1.4}
.it.done{text-decoration:line-through;color:var(--text3);opacity:.6}
.is{font-size:11px;color:var(--text3);margin-top:3px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.tag{font-size:10px;padding:2px 7px;border-radius:8px;background:var(--bg3);color:var(--text2)}
.tag.urg{background:#fdecea;color:var(--red)}.tag.done-t{background:var(--green-l);color:var(--green)}
/* MODAL */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;align-items:flex-end;justify-content:center}
#modal.on{display:flex}
.msheet{background:var(--bg);border-radius:16px 16px 0 0;width:100%;max-width:580px;max-height:88vh;overflow-y:auto;padding:18px}
.mhd{font-family:'Playfair Display',serif;font-size:15px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.mhd button{background:transparent;border:none;font-size:20px;cursor:pointer;color:var(--text3)}
/* ATTACHMENTS */
.ag{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.ai{position:relative;width:68px;height:68px;border-radius:var(--r2);overflow:hidden;border:1px solid var(--border);cursor:pointer;flex-shrink:0}
.ai img{width:100%;height:100%;object-fit:cover;display:block}
.ai .ax{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.adoc{display:flex;align-items:center;gap:5px;padding:5px 9px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);font-size:11px;color:var(--text2);max-width:160px;flex-shrink:0}
.adoc-n{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;font-size:10px}
.aadd{width:68px;height:68px;border:1.5px dashed var(--border2);border-radius:var(--r2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:10px;color:var(--text3);gap:2px;background:var(--bg2);transition:all .15s;flex-shrink:0}
.aadd:hover{border-color:var(--accent);color:var(--accent)}
/* LIGHTBOX */
#lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;align-items:center;justify-content:center}
#lb.on{display:flex}
#lb img{max-width:92vw;max-height:92vh;object-fit:contain;border-radius:var(--r2)}
#lb-x{position:absolute;top:14px;right:18px;background:transparent;border:none;color:#fff;font-size:26px;cursor:pointer;opacity:.7}
#lb-x:hover{opacity:1}
#lb-dl{position:absolute;top:14px;right:60px;color:#fff;font-size:22px;opacity:.7;text-decoration:none;cursor:pointer}
#lb-dl:hover{opacity:1}
/* PROGRESS */
.pw{background:var(--bg3);border-radius:10px;height:4px;margin:8px 0 3px;overflow:hidden}
.pb{height:100%;background:linear-gradient(90deg,var(--green),var(--accent));border-radius:10px;transition:width .5s}
.pl{font-size:10px;color:var(--text3);text-align:right}
/* BUDGET */
.bg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:2px}
.bs{border-radius:var(--r);padding:13px;text-align:center;border:1px solid var(--border)}
.bs.pd{background:var(--green-l)}.bs.up{background:var(--accent-l)}
.bs .bl{font-size:10px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.bs .ba{font-family:'Playfair Display',serif;font-size:22px}
.bs.pd .ba{color:var(--green)}.bs.up .ba{color:var(--accent)}
.bt{text-align:center;padding:8px 0;font-size:12px;color:var(--text2)}
.bt strong{font-family:'Playfair Display',serif;font-size:18px;color:var(--text);margin-left:5px}
/* VENDOR */
.vs{font-size:10px;padding:2px 7px;border-radius:8px;display:inline-block}
.vs-c{background:var(--green-l);color:var(--green)}.vs-p{background:var(--accent-l);color:var(--accent)}.vs-x{background:#fdecea;color:var(--red)}
/* GUEST */
.gs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.gst{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px 6px;text-align:center;box-shadow:var(--shadow)}
.gst .gn{font-family:'Playfair Display',serif;font-size:20px}
.gst .gl{font-size:10px;color:var(--text3);margin-top:1px}
.ryes{background:var(--green-l);color:var(--green)}.rno{background:#fdecea;color:var(--red)}.rpnd{background:var(--bg3);color:var(--text3)}
/* CALENDAR */
.ct{display:flex;align-items:center;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.cal-t{font-family:'Playfair Display',serif;font-size:15px;min-width:130px;text-align:center}
.cnav{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:5px 12px;font-size:13px;cursor:pointer;color:var(--text2)}
.cnav:hover{background:var(--bg3)}
.ctd{padding:5px 10px;font-size:11px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);cursor:pointer;color:var(--text2)}
.ctd:hover{border-color:var(--accent);color:var(--accent)}
.vtabs{display:flex;border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-left:auto}
.vtab{padding:5px 12px;border:none;background:transparent;font-size:11px;color:var(--text2);cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.vtab.on{background:var(--accent-l);color:var(--accent)}
.cj{display:flex;gap:5px}
.cj select{padding:4px 7px;font-size:11px;border:1px solid var(--border);border-radius:var(--r2);background:var(--bg2);color:var(--text)}
.cmg{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.cdow{background:var(--bg2);text-align:center;font-size:10px;color:var(--text3);padding:6px 3px}
.cc{background:var(--bg);min-height:78px;padding:4px;cursor:pointer;transition:background .1s;position:relative}
.cc:hover{background:var(--bg2)}.cc.oth{background:var(--bg2)}.cc.oth .cn{color:var(--text3)}
.cc.tod .cn{background:var(--accent);color:#fff;border-radius:50%}.cc.sel{background:var(--accent-l)}
.cc.wed{background:#fdf3ea}.cc.reg{background:var(--green-l)}
.cn{width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;margin-bottom:2px}
.ep{font-size:9px;padding:1px 4px;border-radius:3px;color:#fff;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.6}
.ep.tp{background:var(--green)}
.sptag{font-size:8px;padding:1px 4px;border-radius:3px;background:var(--accent);color:#fff;margin-bottom:2px;display:inline-block}
/* week */
.ww{border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.wh{display:grid;grid-template-columns:42px repeat(7,1fr);background:var(--bg2);border-bottom:1px solid var(--border)}
.whc{text-align:center;padding:6px 3px;font-size:10px;color:var(--text3)}
.whc .wd{font-size:14px;font-weight:500;color:var(--text);margin-top:1px}
.whc.tc .wd{background:var(--accent);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;margin:2px auto 0}
.wb{display:grid;grid-template-columns:42px repeat(7,1fr)}
.wtc{border-right:1px solid var(--border)}
.wt{font-size:9px;color:var(--text3);padding:0 4px;height:38px;display:flex;align-items:flex-start;padding-top:2px;border-bottom:1px solid var(--border)}
.wdc{border-right:1px solid var(--border);position:relative;cursor:pointer}
.wdc:last-child{border-right:none}.wdc:hover{background:var(--bg2)}
.ws{height:38px;border-bottom:1px solid var(--border)}
.wev{position:absolute;left:2px;right:2px;border-radius:3px;font-size:9px;padding:2px 3px;color:#fff;z-index:2;cursor:pointer;overflow:hidden}
/* list */
.ldh{font-size:11px;color:var(--text3);padding:7px 0 5px;border-bottom:1px solid var(--border);margin-bottom:7px;text-transform:uppercase;letter-spacing:.4px}
.le{display:flex;gap:9px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer}
.le:last-child{border-bottom:none}
.leb{width:3px;border-radius:2px;flex-shrink:0;min-height:16px;align-self:stretch}
.let{font-size:12px;color:var(--text)}
.lem{font-size:10px;color:var(--text3);margin-top:1px}
/* ev panel */
.evp{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);margin-top:12px;box-shadow:var(--shadow);overflow:hidden}
.evph{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.evpt{font-family:'Playfair Display',serif;font-size:14px;flex:1}
.evi{display:flex;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border);cursor:pointer}
.evi:hover{background:var(--bg2)}.evi:last-child{border-bottom:none}
.evd{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.evb{flex:1;min-width:0}
.evt{font-size:12px;color:var(--text)}
.evm{font-size:10px;color:var(--text3);margin-top:1px}
.even{font-size:10px;color:var(--text2);margin-top:1px}
.evaf{padding:12px 14px;border-top:1px solid var(--border)}
.cr{display:flex;gap:5px;flex-wrap:wrap;margin:5px 0}
.cs{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0}
.cs:hover{transform:scale(1.2)}.cs.on{border-color:var(--text);transform:scale(1.1)}
/* loading */
#lo{position:fixed;inset:0;background:rgba(255,255,255,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:10px}
.spin{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:32px;color:var(--text3);font-size:12px}
.empty .em{font-size:24px;margin-bottom:6px}
@media(max-width:540px){
  .gs{grid-template-columns:repeat(2,1fr)}
  .bg2{grid-template-columns:1fr}
  .chips{gap:3px}.chip{font-size:9px;padding:3px 6px}
}
</style>
</head>
<body>
<div id="lo"><div class="spin"></div><p style="font-size:12px;color:var(--text3)">載入中…</p></div>
<div id="lb"><button id="lb-x" onclick="closeLB()">✕</button><a id="lb-dl" download title="下載">⬇</a><img id="lb-img" src="" alt=""></div>
<div id="ov" onclick="closeSB()"></div>
<div id="modal" onclick="if(event.target.id==='modal')closeModal()">
  <div class="msheet">
    <div class="mhd"><span id="modal-title">編輯</span><button onclick="closeModal()">✕</button></div>
    <div id="modal-body"></div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn btn-g" style="flex:1" onclick="closeModal()">取消</button>
      <button class="btn btn-p" style="flex:1" id="modal-save">儲存</button>
    </div>
  </div>
</div>

<div id="sb">
  <div class="sb-top">
    <div class="sb-logo">💍 婚禮規劃</div>
    <div class="sb-d" onclick="editDate('w')"><div class="sb-dl">💒 婚禮日期</div><div class="sb-dv" id="sw-v">點擊設定</div><div class="sb-dc" id="sw-c"></div></div>
    <div class="sb-d" onclick="editDate('r')"><div class="sb-dl">📋 登記日期</div><div class="sb-dv" id="sr-v">點擊設定</div><div class="sb-dc" id="sr-c"></div></div>
  </div>
  <div class="sb-nav">
    <button class="sb-btn on" onclick="goTab('calendar',this)"><span>📅</span>行事曆</button>
    <button class="sb-btn" onclick="goTab('vendor',this)"><span>🏪</span>廠商資訊</button>
    <button class="sb-btn" onclick="goTab('budget',this)"><span>💰</span>費用明細</button>
    <button class="sb-btn" onclick="goTab('todo',this)"><span>✅</span>待辦事項</button>
    <button class="sb-btn" onclick="goTab('guest',this)"><span>👥</span>賓客名單</button>
  </div>
  <div class="sb-sync"><div class="dot spin" id="sdot"></div><span id="slbl">同步中</span></div>
</div>

<div class="topbar">
  <button class="hbg" onclick="openSB()">☰</button>
  <div class="tb-title">婚禮規劃</div>
  <div class="chips">
    <div class="chip" onclick="editDate('w')">💒 <span id="cw-v">設定婚禮</span><span class="chip-cd" id="cw-c"></span></div>
    <div class="chip" onclick="editDate('r')">📋 <span id="cr-v">設定登記</span><span class="chip-cd" id="cr-c"></span></div>
  </div>
</div>

<div class="content">

<!-- CALENDAR -->
<div id="tab-calendar" class="tab on">
  <div class="card">
    <div class="ct">
      <button class="cnav" onclick="chMo(-1)">‹</button>
      <div class="cal-t" id="cal-title"></div>
      <button class="cnav" onclick="chMo(1)">›</button>
      <button class="ctd" onclick="goToday()">今天</button>
      <div class="cj"><select id="cy" onchange="jYear()"></select><select id="cm" onchange="jMonth()"></select></div>
      <div class="vtabs">
        <button class="vtab on" id="vt-month" onclick="setV('month')">月</button>
        <button class="vtab" id="vt-week" onclick="setV('week')">週</button>
        <button class="vtab" id="vt-list" onclick="setV('list')">清單</button>
      </div>
    </div>
    <div id="cal-body"></div>
  </div>
  <div class="evp" id="evp" style="display:none">
    <div class="evph"><div class="evpt" id="evp-title">行程</div><button class="btn btn-g btn-s" onclick="closeEvP()">✕</button></div>
    <div id="ev-list"></div>
    <div class="evaf" id="evaf" style="display:none">
      <div style="font-size:11px;font-weight:500;color:var(--text2);margin-bottom:9px">新增行程</div>
      <div class="fl">
        <div class="f" style="flex:2"><label>行程名稱</label><input type="text" id="ev-txt" placeholder="例：試婚紗"></div>
        <div class="f"><label>類型</label><select id="ev-type"><option value="custom">自訂</option><option value="vendor">廠商約定</option><option value="todo">待辦</option></select></div>
      </div>
      <div class="fl">
        <div class="f"><label>開始</label><input type="time" id="ev-s"></div>
        <div class="f"><label>結束</label><input type="time" id="ev-e"></div>
      </div>
      <div class="fl"><div class="f"><label>備注</label><textarea id="ev-n" style="min-height:40px"></textarea></div></div>
      <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">顏色</div>
      <div class="cr" id="ev-cp"></div>
      <button class="btn btn-p" style="width:100%;margin-top:9px" onclick="addEv()">新增行程</button>
    </div>
  </div>
</div>

<!-- VENDOR -->
<div id="tab-vendor" class="tab">
  <div class="card" id="vc-add">
    <div class="card-hd" onclick="toggleCard('vc-add')"><span>新增廠商</span><span class="card-arr" id="vc-add-arr">›</span></div>
    <div class="card-bd" id="vc-add-bd">
      <div class="fl">

// ═══ FILE STORAGE (localStorage, separate from db) ════
function _allItems(){
  return [...(db.vendors||[]),...(db.exps||[]),...(db.todos||[]),...(db.guests||[]),...(db.events||[])];
}
function saveFiles(){
  // Files live inside db items (_files field) and sync via Firebase automatically.
  // Also keep localStorage as a fast-load cache.
  try{localStorage.setItem(FKEY,JSON.stringify(files));}catch(e){console.warn('localStorage full, files only in db');}
}
function loadFiles(){
  // Source of truth: _files field inside each db item (comes from Firebase).
  let found=false;
  _allItems().forEach(item=>{
    if(item._files&&item._files.length){files[item.id]=item._files;found=true;}
  });
  if(!found){
    // Migration: load from old localStorage and write into db items.
    try{const d=localStorage.getItem(FKEY);if(d)files=JSON.parse(d);}catch(e){files={};}
    _allItems().forEach(item=>{if(files[item.id])item._files=files[item.id];});
  }
}
function getFiles(id){
  const item=_allItems().find(x=>x.id===id);
  return (item&&item._files)||files[id]||[];
}
function setFiles(id,arr){
  files[id]=arr;
  const item=_allItems().find(x=>x.id===id);
  if(item)item._files=arr;
  saveFiles();
}

// ═══ IMAGE COMPRESS ════════════════════════════════════
function compressImg(file){
  return new Promise(res=>{
    if(!file.type.startsWith('image/')){
      // Non-image file: store as base64 with size limit
      if(file.size>10*1024*1024){res(null);alert('檔案太大（限10MB）');return;}
      const r=new FileReader();
      r.onload=()=>res({type:'doc',name:file.name,data:r.result});
      r.onerror=()=>res(null);
      r.readAsDataURL(file);
      return;
    }
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      const MAX=900;
      const scale=Math.min(1,MAX/Math.max(img.width,img.height));
      const w=Math.round(img.width*scale),h=Math.round(img.height*scale);
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      res({type:'img',name:file.name,data:c.toDataURL('image/jpeg',0.75)});
    };
    img.onerror=()=>{URL.revokeObjectURL(url);res(null);};
    img.src=url;
  });
}

// ═══ PICK FILES ════════════════════════════════════════
function pickFiles(){
  return new Promise(res=>{
    const inp=document.createElement('input');
    inp.type='file';
    inp.accept='image/*,application/pdf,.doc,.docx,.xlsx,.txt,.png,.jpg,.jpeg';
    inp.multiple=true;
    inp.style.cssText='position:fixed;top:-200px;left:-200px;width:1px;height:1px;opacity:0';
    document.body.appendChild(inp);
    let done=false;
    const finish=async(files)=>{
      if(done)return;done=true;
      try{document.body.removeChild(inp);}catch(e){}
      const results=[];
      for(const f of Array.from(files||[])){
        const r=await compressImg(f);
        if(r)results.push(r);
      }
      res(results);
    };
    inp.addEventListener('change',e=>finish(e.target.files));
    inp.addEventListener('cancel',()=>finish([]));
    setTimeout(()=>finish([]),120000);
    // Must be synchronous click for iOS
    inp.click();
  });
}

// ═══ ATTACHMENT GRID ═══════════════════════════════════
function fileGrid(itemId){
  const arr=getFiles(itemId);
  const imgs=arr.filter(f=>f.type==='img');
  const docs=arr.filter(f=>f.type==='doc');
  let h='<div class="ag">';
  imgs.forEach((f,i)=>{
    // Use data-idx attribute to avoid quote issues
    h+=`<div class="ai" onclick="openLB(${itemId},${i})"><img src="${f.data}"><button class="ax" onclick="event.stopPropagation();delFile(${itemId},${i})">✕</button></div>`;
  });
  docs.forEach((f,i)=>{
    const idx=i+imgs.length;
    h+=`<div class="adoc" onclick="dlFile(${itemId},${i+imgs.length})" style="cursor:pointer" title="點擊下載"><span style="font-size:14px">📄</span><span class="adoc-n" title="${esc(f.name)}">${esc(f.name)}</span><button onclick="event.stopPropagation();delFile(${itemId},${i+imgs.length})" style="background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:11px;padding:0 3px;flex-shrink:0">✕</button></div>`;
  });
  h+=`<div class="aadd" onclick="addFile(${itemId})"><span style="font-size:18px">＋</span><span>加附件</span></div>`;
  h+='</div>';
  return h;
}

// Called from inline onclick
async function addFile(itemId){
  const results=await pickFiles();
  if(!results.length)return;
  const arr=getFiles(itemId);
  arr.push(...results);
  setFiles(itemId,arr);
  // Refresh grid in modal if open
  const el=document.getElementById('fg-'+itemId);

  renderAll();
  // Sync vendor<->expense files
  syncVendorExpFiles(itemId);

}

async function delFile(itemId,idx){
  if(!confirm('確定要刪除此附件嗎？'))return;
  const arr=getFiles(itemId);
  arr.splice(idx,1);
  setFiles(itemId,arr);
  const el=document.getElementById('fg-'+itemId);
  if(el)el.innerHTML=fileGrid(itemId);
  renderAll();
  syncVendorExpFiles(itemId);
  // Push to Firebase
  await save();
}

function openLB(itemId,imgIdx){
  const arr=getFiles(itemId).filter(f=>f.type==='img');
  const f=arr[imgIdx];
  if(!f)return;
  document.getElementById('lb-img').src=f.data;
  const dl=document.getElementById('lb-dl');
  try{
    const blob=dataURLtoBlob(f.data);
    const burl=URL.createObjectURL(blob);
    dl.href=burl;dl.download=f.name||'image.jpg';
    dl.onclick=()=>setTimeout(()=>URL.revokeObjectURL(burl),300);
  }catch(e){dl.href=f.data;dl.download=f.name||'image.jpg';}
  document.getElementById('lb').classList.add('on');
}
function closeLB(){document.getElementById('lb').classList.remove('on');}
function dataURLtoBlob(dataURL){
  const [header,b64]=dataURL.split(',');
  const mime=header.match(/:(.*?);/)[1];
  const bin=atob(b64);
  const arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:mime});
}
function dlFile(itemId,idx){
  const f=getFiles(itemId)[idx];
  if(!f)return;
  // iOS Safari: open in new tab so built-in PDF viewer handles it
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  if(isIOS){
    window.open(f.data,'_blank');
    return;
  }
  try{
    const blob=dataURLtoBlob(f.data);
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=f.name||'file';
    document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},300);
  }catch(e){
    window.open(f.data,'_blank');
  }
}
document.getElementById('lb').addEventListener('click',e=>{if(e.target.id==='lb')closeLB();});

// Sync files between vendor and linked expense
function syncVendorExpFiles(itemId){
  const arr=getFiles(itemId);
  // Vendor -> sync to all linked expenses
  const v=db.vendors.find(v=>v.id===itemId);
  if(v){
    db.exps.filter(e=>e.vid===itemId).forEach(e=>setFiles(e.id,arr));
  }
  // Expense -> sync back to vendor and sibling expenses
  const exp=db.exps.find(e=>e.id===itemId);
  if(exp&&exp.vid){
    setFiles(exp.vid,arr);
    db.exps.filter(e=>e.vid===exp.vid&&e.id!==itemId).forEach(e=>setFiles(e.id,arr));
  }
}

// ═══ FIREBASE ══════════════════════════════════════════
async function fbGet(){
  const r=await fetch(FB+'/wedding.json');
  if(!r.ok)throw new Error(r.status);
  return r.json();
}
async function fbSet(data){
  const r=await fetch(FB+'/wedding.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  if(!r.ok)throw new Error(r.status);
}

async function pushFB(){
  if(saving)return;
  saving=true;
  try{
    await fbSet(db);
    localStorage.setItem(LKEY,JSON.stringify(db));
    setSync('ok','已同步');
  }catch(e){
    console.error('Firebase push failed:',e);
    setSync('err','離線（本機已存）');
  }
  saving=false;
}

function save(){
  db._ts=Date.now();
  try{
    const j=JSON.stringify(db);
    localStorage.setItem(LKEY,j);
    lastJ=j;
    setSync('spin','儲存中');
  }catch(e){console.error(e);}
  clearTimeout(stimer);
  stimer=setTimeout(pushFB,400);
}

async function loadData(){
  loadFiles();
  const cached=localStorage.getItem(LKEY);
  let localTs=0;

  // Step 1: Load localStorage immediately
  if(cached){
    try{
      const p=JSON.parse(cached);
      db={todos:[],vendors:[],guests:[],events:[],wDate:'',rDate:'',cats:[...DCATS],...p};
      migrate();
      localTs=db._ts||0;
      lastJ=JSON.stringify(db);
    }catch(e){
      localStorage.removeItem(LKEY);
    }
  }

  // Step 2: Show immediately
  document.getElementById('lo').style.display='none';
  renderAll();updateDates();popSelects();
  setSync('spin','同步中');

  // Step 3: Check Firebase
  try{
    const p=await fbGet();
    const fbTs=(p&&p._ts)||0;

    if(!cached){
      // No local data at all
      if(p&&typeof p==='object'&&Object.keys(p).length>1){
        // Use Firebase data
        db={todos:[],vendors:[],guests:[],events:[],wDate:'',rDate:'',cats:[...DCATS],...p};
        migrate();lastJ=JSON.stringify(db);
        localStorage.setItem(LKEY,lastJ);
        files={};loadFiles();
        renderAll();updateDates();popSelects();
        setSync('ok','已同步');
      }else{
        // Firebase empty too - use seed, push to Firebase
        Object.assign(db,SEED);migrate();db._ts=Date.now();
        save();
        renderAll();updateDates();popSelects();
      }
    }else if(fbTs>localTs){
      // Firebase is newer (edited on another device)
      db={todos:[],vendors:[],guests:[],events:[],wDate:'',rDate:'',cats:[...DCATS],...p};
      migrate();lastJ=JSON.stringify(db);
      localStorage.setItem(LKEY,lastJ);
      files={};loadFiles();
      renderAll();updateDates();popSelects();
      setSync('ok','已同步');
    }else{
      // Local is same or newer - push to Firebase
      pushFB();
    }
  }catch(e){
    console.error('Firebase load error:',e);
    if(!cached){
      Object.assign(db,SEED);migrate();db._ts=Date.now();
      localStorage.setItem(LKEY,JSON.stringify(db));
      renderAll();updateDates();popSelects();
    }
    setSync('err','離線（本機資料安全）');
  }

  // Poll every 15s - sync if Firebase is newer
  setInterval(async()=>{
    if(saving)return;
    try{
      const p=await fbGet();
      if(p&&typeof p==='object'&&(p._ts||0)>(db._ts||0)){
        db={todos:[],vendors:[],guests:[],events:[],wDate:'',rDate:'',cats:[...DCATS],...p};
        migrate();lastJ=JSON.stringify(db);
        localStorage.setItem(LKEY,lastJ);
        files={};loadFiles();
        renderAll();updateDates();popSelects();
        setSync('ok','已同步');
      }
    }catch(e){}
  },15000);
}

function migrate(){
  if(!db.todos)db.todos=[];
  if(!db.vendors)db.vendors=[];
  if(!db.guests)db.guests=[];
  if(!db.events)db.events=[];
  // read old 'expenses' field if 'exps' missing
  if((!db.exps||!db.exps.length)&&db.expenses&&db.expenses.length){
    db.exps=[...db.expenses];
  }
  if(!db.exps)db.exps=[];
  // migrate old paid/unpaid format
  db.exps=db.exps.map(e=>e.paid===undefined?{...e,paid:e.status==='paid'?(e.amount||0):0,unpaid:e.status!=='paid'?(e.amount||0):0}:e);
  // ensure vendors have paid/unpaid fields
  db.vendors=db.vendors.map(v=>({paid:0,unpaid:0,...v}));
  // auto-link vendors to expenses
  db.vendors.forEach(v=>{
    const vid=v.id+100000;
    const linked=db.exps.find(e=>e.id===vid||e.vid===v.id);
    if(!linked&&(v.paid||v.unpaid)){
      db.exps.push({id:vid,vid:v.id,name:v.name,cat:v.type,paid:v.paid||0,unpaid:v.unpaid||0,note:v.note||''});
    }
  });
}

function editDate(type){
  const cur=type==='w'?db.wDate:db.rDate;
  const v=prompt('設定'+(type==='w'?'婚禮':'登記')+'日期（YYYY-MM-DD）：',cur||'');
  if(v===null)return;
  if(type==='w')db.wDate=v.trim();else db.rDate=v.trim();
  updateDates();save();
}
function updateDates(){
  setDate('sw-v','sw-c','cw-v','cw-c',db.wDate,'婚禮');
  setDate('sr-v','sr-c','cr-v','cr-c',db.rDate,'登記');
}
function setDate(v1,c1,v2,c2,ds,lbl){
  const el1=document.getElementById(v1),el2=document.getElementById(v2);
  const ec1=document.getElementById(c1),ec2=document.getElementById(c2);
  if(!ds){
    if(el1)el1.textContent='點擊設定';if(el2)el2.textContent='設定'+lbl;
    if(ec1)ec1.textContent='';if(ec2)ec2.textContent='';return;
  }
  const disp=ds.replace(/-/g,'/');
  if(el1)el1.textContent=disp;if(el2)el2.textContent=disp;
  const d=Math.ceil((new Date(ds)-new Date())/86400000);
  const cd=d>0?'倒數'+d+'天':'';
  if(ec1)ec1.textContent=cd;if(ec2)ec2.textContent=d>0?' · 倒數'+d+'天':'';
}
function openModal(title,body,saveFn){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-save').onclick=async()=>{await saveFn();closeModal();};
  document.getElementById('modal').classList.add('on');
}
function closeModal(){document.getElementById('modal').classList.remove('on');}
function popSelects(){
  ['t-cat','e-cat'].forEach(id=>{const el=document.getElementById(id);if(el){const c=el.value;el.innerHTML=catOpts(c||cats()[0]);}});
  const vt=document.getElementById('v-type');if(vt){const c=vt.value;vt.innerHTML=vtOpts(c||DTYPES[0]);}
}
async function handleCat(sel){
  if(sel.value!=='＋新增類別')return;
  const n=prompt('新增類別：','');if(!n?.trim()){sel.value=cats()[0];return;}
  const t=n.trim();if(!db.cats)db.cats=[...DCATS];if(!db.cats.includes(t))db.cats.push(t);
  sel.innerHTML=catOpts(t);sel.value=t;popSelects();await save();
}
async function handleVtype(sel){
  if(sel.value!=='＋新增類別')return;
  const n=prompt('新增類別：','');if(!n?.trim()){sel.value=DTYPES[0];return;}
  const t=n.trim();if(!db.cats)db.cats=[...DCATS];if(!db.cats.includes(t))db.cats.push(t);
  sel.innerHTML=vtOpts(t);sel.value=t;popSelects();await save();
}

function syncVE(v){
  if(!db.exps)db.exps=[];
  // Find existing linked expense to preserve _files and id
  const existing=db.exps.find(e=>e.vid===v.id);
  db.exps=db.exps.filter(e=>e.vid!==v.id);
  if(v.paid||v.unpaid){
    const expId=existing?existing.id:v.id+100000;
    const expFiles=existing?existing._files:v._files;
    const newExp={id:expId,vid:v.id,name:v.name,cat:v.type,paid:v.paid||0,unpaid:v.unpaid||0,note:v.note||''};
    if(expFiles&&expFiles.length)newExp._files=expFiles;
    db.exps.push(newExp);
    // Keep files in sync
    if(expFiles&&expFiles.length)files[expId]=expFiles;
  }
}

    line:document.getElementById('v-line').value,status:document.getElementById('v-st').value,

    unpaid:parseFloat(document.getElementById('v-unpaid').value)||0,
    note:document.getElementById('v-note').value};
  db.vendors.push(v);syncVE(v);
  ['v-name','v-con','v-ph','v-line','v-note'].forEach(i=>document.getElementById(i).value='');

}

    </div>`;

    e.paid=parseFloat(document.getElementById('em-paid').value)||0;

    e.note=document.getElementById('em-note').value;

    const p=e.paid||0,u=e.unpaid||0;

  }).join('');
}

  const t=db.todos.find(t=>t.id===id);if(t){t.done=!t.done;renderTodos();await save();}
}
async function delTodo(id){
  const t=db.todos.find(t=>t.id===id);
  if(!confirm('確定刪除「'+(t?t.text:'')+'」？'))return;
  db.todos=db.todos.filter(t=>t.id!==id);renderTodos();await save();
}
function openTodo(id){
  const t=db.todos.find(t=>t.id===id);if(!t)return;
  const body=`
    <div class="fl"><div class="f"><label>事項名稱</label><input id="em-txt" value="${esc(t.text)}"></div></div>
    <div class="fl" style="margin-top:8px">
      <div class="f"><label>類別</label><select id="em-cat" onchange="handleCat(this)">${catOpts(t.cat)}</select></div>
      <div class="f"><label>截止日</label><input type="date" id="em-due" value="${t.due||''}"></div>
      <div class="f"><label>優先度</label><select id="em-pri"><option value=""${!t.pri?' selected':''}>一般</option><option value="u"${t.pri==='u'?' selected':''}>緊急</option></select></div>
    </div>
    <div class="fl" style="margin-top:8px"><div class="f"><label>備注</label><textarea id="em-note">${esc(t.note||'')}</textarea></div></div>
    <div style="margin-top:12px">
      <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">附件（圖片或文件）</div>
      <div id="fg-${t.id}">${fileGrid(t.id)}</div>
    </div>`;
  openModal(t.text,body,async()=>{
    const nt=document.getElementById('em-txt').value.trim();if(nt)t.text=nt;
    t.cat=document.getElementById('em-cat').value;t.due=document.getElementById('em-due').value;
    t.pri=document.getElementById('em-pri').value;t.note=document.getElementById('em-note').value;
    renderTodos();await save();
  });
}
function renderTodos(){
  const list=document.getElementById('t-list');
  const arr=[...db.todos.filter(t=>!t.done),...db.todos.filter(t=>t.done)];
  if(!arr.length){list.innerHTML='<div class="empty"><div class="em">🌸</div>還沒有待辦</div>';updProg();return;}
  list.innerHTML=arr.map(t=>{
    const fc=getFiles(t.id).length;
    return`<div class="ic">
      <div class="ir">
        <input type="checkbox" style="width:15px;height:15px;accent-color:var(--green);cursor:pointer;flex-shrink:0" ${t.done?'checked':''} onchange="togDone(${t.id})">
        <div class="ib" onclick="openTodo(${t.id})" style="cursor:pointer">
          <div class="it${t.done?' done':''}">${esc(t.text)}</div>
          <div class="is">
            <span class="tag">${t.cat}</span>
            ${t.due?`<span class="tag">📅 ${t.due}</span>`:''}
            ${t.pri==='u'?'<span class="tag urg">緊急</span>':''}
            ${t.done?'<span class="tag done-t">✓</span>':''}
            ${t.note?'<span class="tag">備注</span>':''}
            ${fc?`<span class="tag">📎 ${fc}</span>`:''}
          </div>
        </div>
        <button class="btn btn-g btn-s" onclick="openTodo(${t.id})" style="flex-shrink:0;font-size:11px">詳情</button>
        <button class="btn-x" onclick="delTodo(${t.id})">✕</button>
      </div>
    </div>`;
  }).join('');
  updProg();
}
function updProg(){
  const done=db.todos.filter(t=>t.done).length,total=db.todos.length,pct=total?Math.round(done/total*100):0;
  document.getElementById('pb').style.width=pct+'%';
  document.getElementById('pl').textContent=`${done} / ${total} 完成（${pct}%）`;
}

// ═══ GUESTS ════════════════════════════════════════════
async function addGuest(){
  const name=document.getElementById('g-name').value.trim();if(!name)return;
  if(!db.guests)db.guests=[];
  db.guests.push({id:Date.now(),name,side:document.getElementById('g-side').value,
    table:document.getElementById('g-tbl').value,rsvp:document.getElementById('g-rsvp').value,
    diet:document.getElementById('g-diet').value,note:''});
  ['g-name','g-tbl','g-diet'].forEach(i=>document.getElementById(i).value='');
  renderGuests();await save();
}
async function delGuest(id){
  const g=db.guests.find(g=>g.id===id);
  if(!confirm('確定刪除賓客「'+(g?g.name:'')+'」？'))return;
  db.guests=db.guests.filter(g=>g.id!==id);renderGuests();await save();
}
function openGuest(id){

    </div>

      <div class="f"><label>桌次</label><input id="em-tbl" value="${esc(g.table||'')}"></div>

      <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">附件（圖片或文件）</div>

    g.note=document.getElementById('em-note').value;
    renderGuests();await save();
  });
}
function renderGuests(){
  document.getElementById('g-tot').textContent=db.guests.length;
  document.getElementById('g-yes').textContent=db.guests.filter(g=>g.rsvp==='yes').length;
  document.getElementById('g-no').textContent=db.guests.filter(g=>g.rsvp==='no').length;
  document.getElementById('g-pnd').textContent=db.guests.filter(g=>g.rsvp==='pending').length;
  const list=document.getElementById('g-list');
  if(!db.guests.length){list.innerHTML='<div class="empty"><div class="em">🎊</div>還沒有賓客</div>';return;}

  list.innerHTML=db.guests.map(g=>{
    const fc=getFiles(g.id).length;
    return`<div class="ic">
      <div class="ir" onclick="openGuest(${g.id})">

          <div class="it">${esc(g.name)}</div>
          <div class="is">
            <span class="tag">${g.side}</span>
            <span class="tag ${rl[g.rsvp]||'rpnd'}">${rt[g.rsvp]||'待確認'}</span>
            ${g.table?`<span class="tag">桌${esc(g.table)}</span>`:''}
            ${g.diet?`<span class="tag">${esc(g.diet)}</span>`:''}
            ${fc?`<span class="tag">📎 ${fc}</span>`:''}
          </div>

// ═══ CALENDAR ══════════════════════════════════════════
function setV(v){calV=v;['month','week','list'].forEach(x=>document.getElementById('vt-'+x).classList.toggle('on',x===v));renderCal();}
function chMo(d){calM+=d;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}renderCal();}
function goToday(){const n=new Date();calY=n.getFullYear();calM=n.getMonth();selD=dkey(calY,calM,n.getDate());renderCal();showEvP(selD);}
function jYear(){calY=parseInt(document.getElementById('cy').value);renderCal();}
function jMonth(){calM=parseInt(document.getElementById('cm').value);renderCal();}
function updCalJ(){
  const cy=document.getElementById('cy'),cm=document.getElementById('cm');if(!cy||!cm)return;
  cy.innerHTML=Array.from({length:10},(_,i)=>calY-3+i).map(y=>`<option${y===calY?' selected':''}>${y}</option>`).join('');
  const mns=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  cm.innerHTML=mns.map((m,i)=>`<option value="${i}"${i===calM?' selected':''}>${m}</option>`).join('');
}
function getEv(ds){
  const evs=(db.events||[]).filter(e=>e.date===ds);
  const todos=db.todos.filter(t=>t.due&&t.due.replace(/-/g,'/')===ds);
  const isW=db.wDate&&db.wDate.replace(/-/g,'/')===ds;
  const isR=db.rDate&&db.rDate.replace(/-/g,'/')===ds;
  return{evs,todos,isW,isR};
}
function renderCal(){
  const mns=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('cal-title').textContent=calY+'年 '+mns[calM];
  updCalJ();
  if(calV==='month')renderMonth();else if(calV==='week')renderWeek();else renderListV();
}
function renderMonth(){
  const body=document.getElementById('cal-body');
  const today=new Date();today.setHours(0,0,0,0);
  const fd=new Date(calY,calM,1).getDay(),dim=new Date(calY,calM+1,0).getDate(),dip=new Date(calY,calM,0).getDate();
  let h='<div class="cmg">';
  ['日','一','二','三','四','五','六'].forEach(d=>h+=`<div class="cdow">${d}</div>`);
  for(let i=fd-1;i>=0;i--)h+=`<div class="cc oth"><div class="cn">${dip-i}</div></div>`;
  for(let d=1;d<=dim;d++){
    const ds=dkey(calY,calM,d),dt=new Date(calY,calM,d);
    const isT=dt.getTime()===today.getTime(),isSel=selD===ds;
    const{evs,todos,isW,isR}=getEv(ds);
    let cls='cc';
    if(isW)cls+=' wed';else if(isR)cls+=' reg';if(isT)cls+=' tod';if(isSel)cls+=' sel';
    const sorted=evs.sort((a,b)=>(a.start||'').localeCompare(b.start||''));
    const pills=[
      isW?`<div class="sptag">💒婚禮</div>`:'',
      isR?`<div class="sptag" style="background:var(--green)">📋登記</div>`:'',
      ...sorted.slice(0,2).map(e=>`<div class="ep" style="background:${e.color||'var(--accent)'}">${e.start?e.start.slice(0,5)+' ':''}${esc(e.text)}</div>`),
      sorted.length>2?`<div style="font-size:9px;color:var(--text3)">+${sorted.length-2}</div>`:'',
      ...todos.slice(0,1).map(t=>`<div class="ep tp">✅ ${esc(t.text)}</div>`)
    ].filter(Boolean);
    h+=`<div class="${cls}" onclick="selDate('${ds}')"><div class="cn">${d}</div>${pills.join('')}</div>`;
  }
  const rem=(fd+dim)%7===0?0:7-(fd+dim)%7;
  for(let d=1;d<=rem;d++)h+=`<div class="cc oth"><div class="cn">${d}</div></div>`;
  h+='</div>';body.innerHTML=h;
}
function renderWeek(){
  const body=document.getElementById('cal-body');
  const today=new Date();today.setHours(0,0,0,0);
  const ref=selD?pdate(selD):new Date(),sow=new Date(ref);sow.setDate(ref.getDate()-ref.getDay());
  const days=Array.from({length:7},(_,i)=>{const d=new Date(sow);d.setDate(sow.getDate()+i);return d;});
  const dows=['日','一','二','三','四','五','六'],hrs=Array.from({length:24},(_,i)=>i);
  let h=`<div class="ww"><div class="wh"><div class="whc" style="border-right:1px solid var(--border)"></div>`;
  days.forEach((d,i)=>{
    const isT=d.getTime()===today.getTime();
    h+=`<div class="whc${isT?' tc':''}"><div>${dows[i]}</div><div class="wd">${d.getDate()}</div></div>`;
  });
  h+=`</div><div class="wb"><div class="wtc">${hrs.map(h=>`<div class="wt">${String(h).padStart(2,'0')}:00</div>`).join('')}</div>`;
  days.forEach(d=>{
    const ds=dkey(d.getFullYear(),d.getMonth(),d.getDate());
    const{evs,isW,isR}=getEv(ds);
    const slots=hrs.map(()=>'<div class="ws"></div>').join('');
    const wevs=evs.filter(e=>e.start).map(e=>{
      const[sh,sm]=e.start.split(':').map(Number);
      const top=sh*38+Math.floor(sm/60*38);
      let ht=38;if(e.end){const[eh,em]=e.end.split(':').map(Number);ht=Math.max(18,(eh*60+em-sh*60-sm)/60*38);}
      return`<div class="wev" style="top:${top}px;height:${ht}px;background:${e.color||'var(--accent)'}" onclick="event.stopPropagation();selDate('${ds}')">${e.start.slice(0,5)} ${esc(e.text)}</div>`;
    }).join('');
    const sp=(isW||isR)?`<div style="background:${isW?'var(--accent)':'var(--green)'};color:#fff;font-size:9px;padding:2px 4px;position:absolute;top:0;left:2px;right:2px;border-radius:2px;z-index:3">${isW?'💒婚禮':'📋登記'}</div>`:'';
    h+=`<div class="wdc" onclick="selDate('${ds}')" style="position:relative">${sp}${slots}${wevs}</div>`;
  });
  h+=`</div></div>`;body.innerHTML=h;
}
function renderListV(){
  const body=document.getElementById('cal-body');
  const all=[];
  for(let mi=0;mi<3;mi++){
    const y=calM+mi>11?calY+1:calY,m=(calM+mi)%12,dim=new Date(y,m+1,0).getDate();
    for(let d=1;d<=dim;d++){
      const ds=dkey(y,m,d),{evs,todos,isW,isR}=getEv(ds);
      if(evs.length||todos.length||isW||isR)all.push({ds,evs,todos,isW,isR});
    }
  }
  if(!all.length){body.innerHTML='<div class="empty"><div class="em">📅</div>未來3個月沒有行程</div>';return;}
  const dows=['日','一','二','三','四','五','六'];
  let h='<div style="padding:4px 0">';
  all.forEach(({ds,evs,todos,isW,isR})=>{
    const dt=pdate(ds),lbl=`${ds.replace(/\//g,'-')} ${dows[dt.getDay()]}`;
    h+=`<div class="ldh">${lbl}</div>`;
    if(isW)h+=`<div class="le"><div class="leb" style="background:var(--accent)"></div><div><div class="let">💒 婚禮</div></div></div>`;
    if(isR)h+=`<div class="le"><div class="leb" style="background:var(--green)"></div><div><div class="let">📋 登記</div></div></div>`;
    evs.sort((a,b)=>(a.start||'').localeCompare(b.start||'')).forEach(e=>{
      h+=`<div class="le" onclick="selDate('${ds}')"><div class="leb" style="background:${e.color||'var(--accent)'}"></div><div><div class="let">${e.start?`<span style="color:var(--text3);font-size:10px">${e.start}${e.end?'–'+e.end:''} </span>`:''}${esc(e.text)}</div>${e.note?`<div class="lem">📝 ${esc(e.note)}</div>`:''}</div></div>`;
    });
    todos.forEach(t=>h+=`<div class="le"><div class="leb" style="background:var(--green)"></div><div><div class="let${t.done?' done':''}">✅ ${esc(t.text)}</div></div></div>`);
  });
  h+='</div>';body.innerHTML=h;
}
function selDate(ds){
  selD=ds;
  if(calV==='month')renderMonth();
  else if(calV==='week'){const d=pdate(ds);calY=d.getFullYear();calM=d.getMonth();renderWeek();}
  showEvP(ds);
}
function closeEvP(){document.getElementById('evp').style.display='none';selD=null;if(calV==='month')renderMonth();}
function showEvP(ds){
  const p=document.getElementById('evp'),title=document.getElementById('evp-title');
  const list=document.getElementById('ev-list'),form=document.getElementById('evaf');
  p.style.display='block';
  const dt=pdate(ds),dows=['日','一','二','三','四','五','六'];
  title.textContent=ds.replace(/\//g,'-')+' ('+dows[dt.getDay()]+')';
  form.style.display='block';initCP();
  const{evs,todos,isW,isR}=getEv(ds);
  if(!evs.length&&!todos.length&&!isW&&!isR){list.innerHTML='<div style="padding:9px 14px;font-size:12px;color:var(--text3)">這天還沒有行程</div>';return;}
  const sorted=evs.sort((a,b)=>(a.start||'').localeCompare(b.start||''));
  list.innerHTML=[
    isW?`<div class="evi"><div class="evd" style="background:var(--accent)"></div><div class="evb"><div class="evt">💒 婚禮</div></div></div>`:'',
    isR?`<div class="evi"><div class="evd" style="background:var(--green)"></div><div class="evb"><div class="evt">📋 登記</div></div></div>`:'',
    ...sorted.map(e=>`<div class="evi" onclick="openEvEdit(${e.id},'${ds}')">
      <div class="evd" style="background:${e.color||'var(--accent)'}"></div>
      <div class="evb">
        <div class="evt">${e.start?`<span style="color:var(--text3);font-size:10px">${e.start}${e.end?'–'+e.end:''} </span>`:''}${esc(e.text)}</div>
        ${e.note?`<div class="even">📝 ${esc(e.note)}</div>`:''}
      </div>
      <div style="display:flex;gap:4px;flex-shrink:0;align-items:flex-start">
        <button style="background:transparent;border:1px solid var(--border);border-radius:var(--r2);padding:2px 7px;font-size:10px;color:var(--text2);cursor:pointer" onclick="event.stopPropagation();openEvEdit(${e.id},'${ds}')">✏️</button>
        <button class="btn-x" onclick="event.stopPropagation();delEv(${e.id})">✕</button>
      </div>
    </div>`),
    ...todos.map(t=>`<div class="evi"><div class="evd" style="background:var(--green)"></div><div class="evb"><div class="evt${t.done?' done':''}">✅ ${esc(t.text)}</div></div></div>`)
  ].filter(Boolean).join('');
}
function initCP(){
  const p=document.getElementById('ev-cp');if(!p)return;
  p.innerHTML=EVC.map(c=>`<div class="cs${c===selC?' on':''}" style="background:${c}" onclick="selC='${c}';this.parentElement.querySelectorAll('.cs').forEach(s=>s.classList.remove('on'));this.classList.add('on')"></div>`).join('');
}
function openEvEdit(id,ds){
  const e=(db.events||[]).find(e=>e.id===id);if(!e)return;
  window._evc=e.color||EVC[0];
  const body=`
    <div class="fl"><div class="f"><label>行程名稱</label><input id="em-txt" value="${esc(e.text)}"></div></div>
    <div class="fl" style="margin-top:8px">
      <div class="f"><label>開始</label><input type="time" id="em-s" value="${e.start||''}"></div>
      <div class="f"><label>結束</label><input type="time" id="em-e" value="${e.end||''}"></div>
    </div>
    <div class="fl" style="margin-top:8px"><div class="f"><label>備注</label><textarea id="em-note">${esc(e.note||'')}</textarea></div></div>
    <div style="margin-top:10px"><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px">顏色</div>
    <div class="cr">${EVC.map(c=>`<div class="cs${c===(e.color||EVC[0])?' on':''}" style="background:${c}" onclick="window._evc='${c}';this.parentElement.querySelectorAll('.cs').forEach(s=>s.classList.remove('on'));this.classList.add('on')"></div>`).join('')}</div></div>`;
  openModal(e.text,body,async()=>{
    const nt=document.getElementById('em-txt').value.trim();if(nt)e.text=nt;
    e.start=document.getElementById('em-s').value;e.end=document.getElementById('em-e').value;
    e.note=document.getElementById('em-note').value;e.color=window._evc||e.color;
    renderCal();showEvP(ds);await save();
  });
}
async function addEv(){
  if(!selD)return;const text=document.getElementById('ev-txt').value.trim();if(!text)return;
  if(!db.events)db.events=[];
  db.events.push({id:Date.now(),date:selD,text,type:document.getElementById('ev-type').value,
    color:selC,start:document.getElementById('ev-s').value,end:document.getElementById('ev-e').value,
    note:document.getElementById('ev-n').value.trim()});
  document.getElementById('ev-txt').value='';document.getElementById('ev-s').value='';
  document.getElementById('ev-e').value='';document.getElementById('ev-n').value='';
  renderCal();showEvP(selD);await save();
}
async function delEv(id){
  const e=(db.events||[]).find(e=>e.id===id);
  if(!confirm('確定刪除行程「'+(e?e.text:'')+'」？'))return;
  db.events=db.events.filter(e=>e.id!==id);renderCal();if(selD)showEvP(selD);await save();
}

function renderAll(){renderTodos();renderExps();renderVendors();renderGuests();renderCal();}
loadData();
</script>
