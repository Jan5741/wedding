<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>婚禮規劃</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f8f6;--bg3:#f0efe9;
  --border:#e5e3db;--border2:#ccc9be;
  --text:#1c1c1a;--text2:#5c5a54;--text3:#9a9890;
  --accent:#b8956a;--accent-l:#f5ede2;
  --green:#6a9e72;--green-l:#edf5ee;
  --red:#c0392b;--blue:#5b8fa8;
  --shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --r:10px;--r2:6px;--r3:14px;
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg2);color:var(--text);min-height:100vh;font-size:14px}

/* ── OVERLAY ── */
#sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:199;backdrop-filter:blur(2px)}
#sb-overlay.show{display:block}

/* ── SIDEBAR ── */
#sidebar{
  position:fixed;top:0;left:-240px;width:220px;height:100vh;
  background:var(--bg);border-right:1px solid var(--border);
  z-index:200;transition:left .25s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;box-shadow:4px 0 24px rgba(0,0,0,.08);
}
#sidebar.open{left:0}
.sb-top{padding:20px 16px 12px;border-bottom:1px solid var(--border)}
.sb-logo{font-family:'Playfair Display',serif;font-size:15px;color:var(--text);margin-bottom:14px}
.sb-date{font-size:12px;color:var(--text2);padding:6px 10px;background:var(--bg2);border-radius:var(--r2);margin-bottom:6px;cursor:pointer;transition:background .15s}
.sb-date:hover{background:var(--bg3)}
.sb-date-label{color:var(--text3);font-size:11px;margin-bottom:1px}
.sb-date-val{color:var(--text);font-weight:500}
.sb-date-cd{color:var(--accent);font-size:11px}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.sb-btn{
  display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;
  border:none;background:transparent;cursor:pointer;border-radius:var(--r2);
  color:var(--text2);font-family:'Noto Sans TC',sans-serif;font-size:13px;
  transition:all .15s;text-align:left;margin-bottom:2px;
}
.sb-btn:hover{background:var(--bg2);color:var(--text)}
.sb-btn.active{background:var(--accent-l);color:var(--accent);font-weight:500}
.sb-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.sb-divider{height:1px;background:var(--border);margin:6px 8px}
.sb-sync{padding:10px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3)}
.sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:#ccc}
.sync-dot.ok{background:var(--green)}.sync-dot.err{background:var(--red)}.sync-dot.loading{background:var(--accent);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:100;height:52px;
  background:var(--bg);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;
  box-shadow:0 1px 0 var(--border);
}
.hamburger{background:transparent;border:none;font-size:20px;cursor:pointer;color:var(--text2);padding:6px;border-radius:var(--r2);transition:background .15s;line-height:1}
.hamburger:hover{background:var(--bg2)}
.topbar-title{font-family:'Playfair Display',serif;font-size:17px;color:var(--text)}
.topbar-chips{display:flex;gap:6px;margin-left:auto}
.chip{padding:4px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;font-size:11px;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip-cd{color:var(--accent);font-weight:500}

/* ── CONTENT ── */
.content{padding:20px 16px;max-width:820px;margin:0 auto}
.tab-panel{display:none}.tab-panel.active{display:block}

/* ── CARDS ── */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px;box-shadow:var(--shadow)}
.card-title{font-family:'Playfair Display',serif;font-size:15px;color:var(--text);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}

/* ── INPUTS ── */
.field{margin-bottom:0}
.field label{display:block;font-size:11px;color:var(--text3);margin-bottom:4px;letter-spacing:.4px;text-transform:uppercase}
.frow{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.frow .field{flex:1;min-width:90px}
input[type=text],input[type=number],input[type=date],input[type=time],select,textarea{
  width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:var(--r2);
  font-family:'Noto Sans TC',sans-serif;font-size:13px;color:var(--text);
  background:var(--bg2);outline:none;transition:border .15s,background .15s;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--bg)}
textarea{resize:vertical;min-height:50px}
.btn{padding:8px 16px;border:none;border-radius:var(--r2);font-family:'Noto Sans TC',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#9e7a52}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}.btn-ghost:hover{background:var(--bg2)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-del{background:transparent;border:none;color:var(--border2);cursor:pointer;font-size:14px;padding:4px 6px;transition:color .15s;line-height:1}.btn-del:hover{color:var(--red)}

/* ── ROW ITEMS ── */
.item-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden;transition:box-shadow .15s}
.item-card:hover{box-shadow:var(--shadow)}
.item-row{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.item-body{flex:1;min-width:0}
.item-title{font-size:14px;color:var(--text);line-height:1.4}
.item-title.done{text-decoration:line-through;color:var(--text3);opacity:.6}
.item-sub{font-size:11px;color:var(--text3);margin-top:4px;display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:11px;padding:2px 7px;border-radius:8px;background:var(--bg3);color:var(--text2)}
.tag.urgent{background:#fdecea;color:var(--red)}.tag.done-t{background:var(--green-l);color:var(--green)}
.arrow{font-size:14px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.arrow.open{transform:rotate(90deg)}
.item-detail{display:none;border-top:1px solid var(--border)}
.item-detail.open{display:block}

/* Detail view (not edit by default) */
.detail-view{padding:14px 14px 0}
.detail-edit{padding:14px;display:none}
.detail-edit.show{display:block}
.detail-actions{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--border);margin-top:4px}

/* ── PHOTOS/FILES ── */
.attach-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.attach-img{position:relative;width:72px;height:72px;border-radius:var(--r2);overflow:hidden;border:1px solid var(--border);cursor:pointer}
.attach-img img{width:100%;height:100%;object-fit:cover;transition:opacity .15s}
.attach-img:hover img{opacity:.85}
.attach-file{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);font-size:11px;color:var(--text2);cursor:pointer;max-width:160px}
.attach-file-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.attach-del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.attach-add{width:72px;height:72px;border:1.5px dashed var(--border2);border-radius:var(--r2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:10px;color:var(--text3);gap:2px;background:var(--bg2);transition:all .15s;flex-shrink:0}
.attach-add:hover{border-color:var(--accent);color:var(--accent)}

/* ── LIGHTBOX ── */
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;align-items:center;justify-content:center}
#lightbox.show{display:flex}
#lightbox img{max-width:92vw;max-height:92vh;object-fit:contain;border-radius:var(--r2)}
#lightbox-close{position:absolute;top:16px;right:20px;background:transparent;border:none;color:#fff;font-size:28px;cursor:pointer;opacity:.7}
#lightbox-close:hover{opacity:1}

/* ── PROGRESS ── */
.prog-wrap{background:var(--bg3);border-radius:10px;height:4px;margin:8px 0 4px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--green),var(--accent));border-radius:10px;transition:width .5s}
.prog-lbl{font-size:11px;color:var(--text3);text-align:right}

/* ── BUDGET ── */
.bsum-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:2px}
.bsum{border-radius:var(--r);padding:16px;text-align:center;border:1px solid var(--border)}
.bsum.paid{background:var(--green-l)}.bsum.unpaid{background:var(--accent-l)}
.bsum .bl{font-size:11px;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.bsum .ba{font-family:'Playfair Display',serif;font-size:24px}
.bsum.paid .ba{color:var(--green)}.bsum.unpaid .ba{color:var(--accent)}
.btotal{text-align:center;padding:10px 0;font-size:13px;color:var(--text2)}
.btotal strong{font-family:'Playfair Display',serif;font-size:20px;color:var(--text);margin-left:6px}

/* ── VENDOR ── */
.vstatus{font-size:11px;padding:2px 8px;border-radius:8px;display:inline-block}
.vstatus-confirmed{background:var(--green-l);color:var(--green)}
.vstatus-pending{background:var(--accent-l);color:var(--accent)}
.vstatus-cancelled{background:#fdecea;color:var(--red)}

/* ── GUEST ── */
.g-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.g-stat{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:12px 8px;text-align:center;box-shadow:var(--shadow)}
.g-stat .gnum{font-family:'Playfair Display',serif;font-size:22px}
.g-stat .glbl{font-size:11px;color:var(--text3);margin-top:2px}
.rsvp-yes{background:var(--green-l);color:var(--green)}.rsvp-no{background:#fdecea;color:var(--red)}.rsvp-pending{background:var(--bg3);color:var(--text3)}

/* ── CALENDAR ── */
.cal-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.cal-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--text);min-width:140px;text-align:center}
.cal-nav{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:5px 14px;font-size:14px;cursor:pointer;color:var(--text2);transition:all .15s}
.cal-nav:hover{background:var(--bg3)}
.cal-today-btn{padding:5px 12px;font-size:12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);cursor:pointer;color:var(--text2);transition:all .15s}
.cal-today-btn:hover{border-color:var(--accent);color:var(--accent)}
.view-tabs{display:flex;border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-left:auto}
.view-tab{padding:5px 14px;border:none;background:transparent;font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s;font-family:'Noto Sans TC',sans-serif}
.view-tab.active{background:var(--accent-l);color:var(--accent)}
.cal-jump{display:flex;gap:6px}
.cal-jump select{padding:5px 8px;font-size:12px;border:1px solid var(--border);border-radius:var(--r2);background:var(--bg2);color:var(--text);cursor:pointer}

/* Month */
.cal-month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.cal-dow{background:var(--bg2);text-align:center;font-size:11px;color:var(--text3);padding:7px 4px;letter-spacing:.3px}
.cal-cell{background:var(--bg);min-height:90px;padding:5px;cursor:pointer;transition:background .1s;position:relative;vertical-align:top}
.cal-cell:hover{background:var(--bg2)}
.cal-cell.other{background:var(--bg2)}.cal-cell.other .cnum{color:var(--text3)}
.cal-cell.today .cnum{background:var(--accent);color:#fff;border-radius:50%}
.cal-cell.selected{background:var(--accent-l)}
.cal-cell.wedding-d{background:#fdf3ea}.cal-cell.registry-d{background:var(--green-l)}
.cnum{width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;margin-bottom:3px}
.ev-pill{font-size:10px;padding:1px 5px;border-radius:3px;color:#fff;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.6}
.ev-pill.todo-p{background:var(--green)}
.special-tag{font-size:9px;padding:1px 5px;border-radius:3px;background:var(--accent);color:#fff;margin-bottom:2px;display:inline-block}

/* Week */
.week-wrap{border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.week-head{display:grid;grid-template-columns:44px repeat(7,1fr);background:var(--bg2);border-bottom:1px solid var(--border)}
.wh-cell{text-align:center;padding:7px 4px;font-size:11px;color:var(--text3)}
.wh-cell .wdate{font-size:15px;font-weight:500;color:var(--text);margin-top:1px}
.wh-cell.today-c .wdate{background:var(--accent);color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;margin:2px auto 0}
.week-body{display:grid;grid-template-columns:44px repeat(7,1fr)}
.wtime-col{border-right:1px solid var(--border)}
.wtime{font-size:10px;color:var(--text3);padding:0 5px;height:40px;display:flex;align-items:flex-start;padding-top:2px;border-bottom:1px solid var(--border)}
.wday-col{border-right:1px solid var(--border);position:relative;cursor:pointer;transition:background .1s}
.wday-col:last-child{border-right:none}
.wday-col:hover{background:var(--bg2)}
.wslot{height:40px;border-bottom:1px solid var(--border)}
.wev{position:absolute;left:2px;right:2px;border-radius:3px;font-size:10px;padding:2px 4px;color:#fff;z-index:2;cursor:pointer;line-height:1.4;overflow:hidden}

/* List */
.list-date-h{font-size:12px;color:var(--text3);padding:8px 0 5px;border-bottom:1px solid var(--border);margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px}
.list-ev{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer}
.list-ev:last-child{border-bottom:none}
.list-ev-bar{width:3px;border-radius:2px;flex-shrink:0;min-height:18px;align-self:stretch}
.list-ev-title{font-size:13px;color:var(--text)}
.list-ev-meta{font-size:11px;color:var(--text3);margin-top:2px}
.list-ev-note{font-size:11px;color:var(--text2);margin-top:2px}

/* Event panel */
.ev-panel{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);margin-top:14px;box-shadow:var(--shadow);overflow:hidden}
.ev-panel-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.ev-panel-title{font-family:'Playfair Display',serif;font-size:15px;flex:1}
.ev-item{display:flex;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.ev-item:hover{background:var(--bg2)}
.ev-item:last-child{border-bottom:none}
.ev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.ev-body{flex:1;min-width:0}
.ev-title{font-size:13px;color:var(--text)}
.ev-meta{font-size:11px;color:var(--text3);margin-top:2px}
.ev-note{font-size:11px;color:var(--text2);margin-top:2px}
.ev-actions-row{display:flex;gap:6px;flex-shrink:0;align-items:flex-start}
.ev-edit-b{background:transparent;border:1px solid var(--border);border-radius:var(--r2);padding:3px 8px;font-size:11px;color:var(--text2);cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.ev-add-form{padding:14px 16px;border-top:1px solid var(--border)}
.color-row{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
.cswatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0}
.cswatch:hover{transform:scale(1.2)}.cswatch.sel{border-color:var(--text);transform:scale(1.1)}

/* Edit overlay modal */
#edit-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300;align-items:flex-end;justify-content:center}
#edit-modal.show{display:flex}
.edit-sheet{background:var(--bg);border-radius:var(--r3) var(--r3) 0 0;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:20px}
.edit-sheet-title{font-family:'Playfair Display',serif;font-size:16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}

/* Loading */
#loadingOverlay{position:fixed;inset:0;background:rgba(255,255,255,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px}
.spinner{width:30px;height:30px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.empty{text-align:center;padding:36px 20px;color:var(--text3);font-size:13px}
.empty .emoji{font-size:26px;margin-bottom:8px}

@media(max-width:560px){
  .g-stats{grid-template-columns:repeat(2,1fr)}
  .bsum-grid{grid-template-columns:1fr}
  .topbar-chips{gap:4px}
  .chip{padding:3px 7px;font-size:10px}
  .cal-jump select{font-size:11px}
}
</style>
</head>
<body>
<div id="loadingOverlay"><div class="spinner"></div><p style="font-size:13px;color:var(--text3)">載入中…</p></div>
<div id="lightbox"><button id="lightbox-close" onclick="closeLightbox()">✕</button><img id="lightbox-img" src="" alt=""></div>
<div id="sb-overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sb-top">
    <div class="sb-logo">💍 婚禮規劃</div>
    <div class="sb-date" onclick="editDate('wedding')">
      <div class="sb-date-label">💒 婚禮日期</div>
      <div class="sb-date-val" id="sb-w-val">點擊設定</div>
      <div class="sb-date-cd" id="sb-w-cd"></div>
    </div>
    <div class="sb-date" onclick="editDate('registry')">
      <div class="sb-date-label">📋 登記日期</div>
      <div class="sb-date-val" id="sb-r-val">點擊設定</div>
      <div class="sb-date-cd" id="sb-r-cd"></div>
    </div>
  </div>
  <div class="sb-nav">
    <button class="sb-btn active" onclick="switchTab('todo',this)"><span class="sb-icon">✅</span>待辦事項</button>
    <button class="sb-btn" onclick="switchTab('budget',this)"><span class="sb-icon">💰</span>費用明細</button>
    <button class="sb-btn" onclick="switchTab('vendor',this)"><span class="sb-icon">🏪</span>廠商資訊</button>
    <button class="sb-btn" onclick="switchTab('guest',this)"><span class="sb-icon">👥</span>賓客名單</button>
    <div class="sb-divider"></div>
    <button class="sb-btn" onclick="switchTab('calendar',this)"><span class="sb-icon">📅</span>行事曆</button>
  </div>
  <div class="sb-sync"><div class="sync-dot loading" id="syncDot"></div><span id="syncLabel">同步中</span></div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <button class="hamburger" onclick="openSidebar()">☰</button>
  <div class="topbar-title">婚禮規劃</div>
  <div class="topbar-chips">
    <div class="chip" onclick="editDate('wedding')">💒 <span id="chip-w">設定婚禮</span><span class="chip-cd" id="chip-w-cd"></span></div>
    <div class="chip" onclick="editDate('registry')">📋 <span id="chip-r">設定登記</span><span class="chip-cd" id="chip-r-cd"></span></div>
  </div>
</div>

<!-- EDIT MODAL -->
<div id="edit-modal" onclick="handleModalBg(event)">
  <div class="edit-sheet" id="edit-sheet">
    <div class="edit-sheet-title"><span id="edit-title">編輯</span><button onclick="closeEditModal()" style="background:transparent;border:none;font-size:20px;cursor:pointer;color:var(--text3)">✕</button></div>
    <div id="edit-body"></div>
    <div style="display:flex;gap:8px;margin-top:16px">

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function getCats(){return db.cats&&db.cats.length?db.cats:[...DEFAULT_CATS]}
function catOpts(cur){return[...getCats(),'＋新增類別'].map(o=>`<option${o===cur?' selected':''}>${o}</option>`).join('')}
function vtypeOpts(cur){return[...VTYPES,...getCats().filter(c=>!VTYPES.includes(c)),'＋新增類別'].map(o=>`<option${o===cur?' selected':''}>${o}</option>`).join('')}
function setSyncState(s,t){document.getElementById('syncDot').className='sync-dot '+s;document.getElementById('syncLabel').textContent=t}
function toB64(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f)})}
function dateKey(y,m,d){return y+'/'+(String(m+1).padStart(2,'0'))+'/'+String(d).padStart(2,'0')}
function parseDate(s){const[y,m,d]=s.split(/[-\/]/).map(Number);return new Date(y,m-1,d)}

// ── JSONBIN STORAGE ──────────────────────────────────────
async function binFetch(method='GET', body=null){
  const res=await fetch('https://api.jsonbin.io/v3/b/'+BIN_ID+(method==='GET'?'/latest':''),{
    method,
    headers:{
      'Content-Type':'application/json',
      'X-Master-Key':API_KEY,
      'X-Bin-Versioning':'false'
    },
    body:body?JSON.stringify(body):null
  });
  if(!res.ok)throw new Error(await res.text());
  return res.json();
}
async function saveData(){
  if(saving)return;saving=true;
  try{
    const j=JSON.stringify(db);
    // Always save locally first
    localStorage.setItem(DB_KEY,j);
    lastJSON=j;
    setSyncState('loading','儲存中');
    // Then try cloud
    await binFetch('PUT',db);
    setSyncState('ok','已同步');
  }catch(e){
    console.error('Save error:',e);
    setSyncState('err','本機已存');
  }finally{saving=false;}
}
async function loadData(){
  // Step 1: show something immediately, never block on network
  const cached=localStorage.getItem(DB_KEY);
  if(cached){
    try{
      const p=JSON.parse(cached);
      db={todos:[],expenses:[],vendors:[],guests:[],events:[],weddingDate:'',registryDate:'',cats:[...DEFAULT_CATS],...p};
      migrateData();
      lastJSON=cached;
    }catch(e){
      db=JSON.parse(JSON.stringify(SEED));
    }
  } else {
    db=JSON.parse(JSON.stringify(SEED));
  }
  // Show UI right away
  document.getElementById('loadingOverlay').style.display='none';
  renderAll();updateDates();populateSelects();
  setSyncState('loading','同步中');

  // Step 2: try JSONBin in background
  try{
    const res=await binFetch('GET');
    const p=res.record||res;
    if(p&&Object.keys(p).length>1&&!p.init){
      const j=JSON.stringify(p);
      if(j!==lastJSON){
        db={todos:[],expenses:[],vendors:[],guests:[],events:[],weddingDate:'',registryDate:'',cats:[...DEFAULT_CATS],...p};
        migrateData();
        lastJSON=j;
        localStorage.setItem(DB_KEY,j);
        renderAll();updateDates();populateSelects();
      }
    } else if(!cached){
      // First time: save SEED to JSONBin
      await saveData();
    }
    setSyncState('ok','已同步');
  }catch(e){
    console.error('JSONBin:',e);
    setSyncState('err','離線模式');
    if(!cached){
      // save locally at least
      localStorage.setItem(DB_KEY,JSON.stringify(db));
    }
  }

  // Step 3: poll every 10s
  setInterval(async()=>{
    if(saving)return;
    try{
      const res=await binFetch('GET');
      const p=res.record||res;
      if(p&&!p.init){
        const j=JSON.stringify(p);
        if(j!==lastJSON){
          db={todos:[],expenses:[],vendors:[],guests:[],events:[],weddingDate:'',registryDate:'',cats:[...DEFAULT_CATS],...p};
          migrateData();lastJSON=j;
          localStorage.setItem(DB_KEY,j);
          renderAll();updateDates();populateSelects();
          setSyncState('ok','已同步');
        }
      }
    }catch(e){setSyncState('err','離線模式');}
  },10000);
}

function migrateData(){
  db.expenses=db.expenses.map(e=>e.paid===undefined?{...e,paid:e.status==='paid'?(e.amount||0):0,unpaid:e.status!=='paid'?(e.amount||0):0}:e);
  db.vendors=db.vendors.map(v=>({paid:0,unpaid:0,...v}));
  db.todos=db.todos.map(t=>({files:[],...t}));
  db.expenses=db.expenses.map(e=>({files:[],...e}));
  db.vendors=db.vendors.map(v=>({files:[],...v}));
  db.guests=db.guests.map(g=>({files:[],...g,note:g.note||''}));
  // link vendors to expenses
  db.vendors.forEach(v=>{
    if(!v.paid&&!v.unpaid)return;
    const linked=db.expenses.find(e=>e.vendorId===v.id);
    if(!linked){
      const byName=db.expenses.find(e=>!e.vendorId&&e.name&&e.name.includes(v.name.split('：')[1]||v.name));
      if(byName){byName.vendorId=v.id;byName.paid=v.paid;byName.unpaid=v.unpaid;}
      else if(v.paid||v.unpaid){db.expenses.push({id:Date.now()+(Math.random()*1000|0),name:v.name,cat:v.type,paid:v.paid,unpaid:v.unpaid,note:v.note||'',files:[],vendorId:v.id});}
    }
  });
}

function setDateUI(vId,cId,cvId,ccId,ds,label){
  const v=document.getElementById(vId),c=document.getElementById(cId);
  const cv=document.getElementById(cvId),cc=document.getElementById(ccId);
  if(!ds){if(v)v.textContent='點擊設定';if(c)c.textContent='';if(cv)cv.textContent='設定'+label;if(cc)cc.textContent='';return;}
  const disp=ds.replace(/-/g,'/');
  if(v)v.textContent=disp;if(cv)cv.textContent=disp;
  const d=Math.ceil((new Date(ds)-new Date())/86400000);
  const cd=d>0?` · 倒數${d}天`:d===0?' · 今天':'';
  if(c)c.textContent=d>0?`倒數${d}天`:'';if(cc)cc.textContent=cd;
}

function attachGrid(files,onDel,onAdd,onView){
  const imgs=(files||[]).filter(f=>f.type==='img');
  const docs=(files||[]).filter(f=>f.type==='doc');
  let h='<div class="attach-grid">';
  imgs.forEach((f,i)=>`${h+=`<div class="attach-img" onclick="${onView}(${i})"><img src="${f.data}"><button class="attach-del" onclick="event.stopPropagation();${onDel}(${i})">✕</button></div>`}`);
  docs.forEach((f,i)=>`${h+=`<div class="attach-file" title="${esc(f.name)}"><span style="font-size:16px">📄</span><span class="attach-file-name">${esc(f.name)}</span><button onclick="event.stopPropagation();${onDel}(${i+imgs.length})" style="background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:12px;flex-shrink:0">✕</button></div>`}`);
  h+=`<div class="attach-add" onclick="${onAdd}()"><span style="font-size:18px">＋</span><span>加附件</span></div>`;
  h+='</div>';
  return h;
}

async function toggleDone(id){const t=db.todos.find(t=>t.id===id);if(t){t.done=!t.done;renderTodos();await saveData()}}
async function deleteTodo(id){const t=db.todos.find(t=>t.id===id);if(!confirm('確定要刪除待辦「'+(t?t.text:'此項目')+'」嗎？'))return;db.todos=db.todos.filter(t=>t.id!==id);renderTodos();await saveData()}

function openTodoDetail(id){

function buildTodoFileGrid(t){
  if(!t.files)t.files=[];
  const imgs=t.files.filter(f=>f.type==='img');
  const docs=t.files.filter(f=>f.type==='doc');
  let h='<div class="attach-grid" id="todo-attach-'+t.id+'">';
  imgs.forEach((f,i)=>h+=`<div class="attach-img" onclick="openLightbox('${f.data}')"><img src="${f.data}"><button class="attach-del" onclick="event.stopPropagation();removeTodoFile(${t.id},${i})">✕</button></div>`);
  docs.forEach((f,i)=>h+=`<div class="attach-file"><span style="font-size:16px">📄</span><span class="attach-file-name" title="${esc(f.name)}">${esc(f.name)}</span><button onclick="removeTodoFile(${t.id},${i+imgs.length})" style="background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:12px">✕</button></div>`);
  h+=`<div class="attach-add" onclick="addTodoFile(${t.id})"><span style="font-size:18px">＋</span><span>加附件</span></div></div>`;
  return h;
}

async function addTodoFile(id){
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*,application/pdf,.doc,.docx,.xls,.xlsx,.txt';inp.multiple=true;
  inp.onchange=async(e)=>{
    const t=db.todos.find(t=>t.id===id);if(!t)return;if(!t.files)t.files=[];
    for(const f of e.target.files){
      const isImg=f.type.startsWith('image/');
      const data=await toB64(f);
      t.files.push({type:isImg?'img':'doc',name:f.name,data});
    }
    // refresh modal body
    const el=document.getElementById('todo-attach-'+id);
    if(el){const t2=db.todos.find(t=>t.id===id);if(t2){const tmp=document.createElement('div');tmp.innerHTML=buildTodoFileGrid(t2);el.replaceWith(tmp.firstChild)}}
    renderTodos();await saveData();
  };inp.click();
}
async function removeTodoFile(id,idx){
  if(!confirm('確定要刪除此附件嗎？'))return;
  const t=db.todos.find(t=>t.id===id);if(!t||!t.files)return;t.files.splice(idx,1);
  const el=document.getElementById('todo-attach-'+id);
  if(el){const tmp=document.createElement('div');tmp.innerHTML=buildTodoFileGrid(t);el.replaceWith(tmp.firstChild)}
  renderTodos();await saveData();
}

function renderTodos(){
  const list=document.getElementById('todo-list');
  const arr=[...db.todos.filter(t=>!t.done),...db.todos.filter(t=>t.done)];
  if(!arr.length){list.innerHTML='<div class="empty"><div class="emoji">🌸</div>還沒有待辦事項</div>';updateProgress();return}
  list.innerHTML=arr.map(t=>`
    <div class="item-card">
      <div class="item-row">
        <input type="checkbox" style="width:16px;height:16px;accent-color:var(--green);cursor:pointer;flex-shrink:0" ${t.done?'checked':''} onchange="toggleDone(${t.id})">
        <div class="item-body" onclick="openTodoDetail(${t.id})" style="cursor:pointer">
          <div class="item-title${t.done?' done':''}">${esc(t.text)}</div>
          <div class="item-sub">
            <span class="tag">${t.cat}</span>
            ${t.due?`<span class="tag">📅 ${t.due}</span>`:''}
            ${t.priority==='urgent'?'<span class="tag urgent">緊急</span>':''}
            ${t.done?'<span class="tag done-t">✓ 完成</span>':''}
            ${t.note?'<span class="tag">備注</span>':''}
            ${(t.files||[]).length?`<span class="tag">📎 ${t.files.length}</span>`:''}
          </div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="openTodoDetail(${t.id})" style="flex-shrink:0">詳情</button>
        <button class="btn-del" onclick="deleteTodo(${t.id})">✕</button>
      </div>
    </div>`).join('');
  updateProgress();
}
function updateProgress(){
  const done=db.todos.filter(t=>t.done).length,total=db.todos.length,pct=total?Math.round(done/total*100):0;
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('progressLbl').textContent=`${done} / ${total} 完成（${pct}%）`;
}

async function addVendorFile(id){

// ── CALENDAR ──────────────────────────────────────────────
function setView(v){
  calView=v;['month','week','list'].forEach(x=>document.getElementById('vt-'+x).classList.toggle('active',x===v));
  renderCalendar();
}
function changeMonth(d){calMonth+=d;if(calMonth>11){calMonth=0;calYear++}if(calMonth<0){calMonth=11;calYear--}renderCalendar()}
function goToday(){const n=new Date();calYear=n.getFullYear();calMonth=n.getMonth();selDate=dateKey(calYear,calMonth,n.getDate());renderCalendar();showEvPanel(selDate)}
function jumpYear(){calYear=parseInt(document.getElementById('cal-year-sel').value);renderCalendar()}
function jumpMonth(){calMonth=parseInt(document.getElementById('cal-month-sel').value);renderCalendar()}

function updateCalJump(){
  const ySel=document.getElementById('cal-year-sel');
  const mSel=document.getElementById('cal-month-sel');
  if(!ySel||!mSel)return;
  const curY=calYear;
  const years=Array.from({length:10},(_,i)=>curY-3+i);
  ySel.innerHTML=years.map(y=>`<option${y===calYear?' selected':''}>${y}</option>`).join('');
  const mns=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  mSel.innerHTML=mns.map((m,i)=>`<option value="${i}"${i===calMonth?' selected':''}>${m}</option>`).join('');
}

function getEvForDate(ds){
  const evs=(db.events||[]).filter(e=>e.date===ds);
  const todos=db.todos.filter(t=>t.due&&t.due.replace(/-/g,'/')===ds);
  const isW=db.weddingDate&&db.weddingDate.replace(/-/g,'/')===ds;
  const isR=db.registryDate&&db.registryDate.replace(/-/g,'/')===ds;
  return{evs,todos,isW,isR};
}

function renderCalendar(){
  const mns=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('cal-title').textContent=calYear+'年 '+mns[calMonth];
  updateCalJump();
  if(calView==='month')renderMonth();
  else if(calView==='week')renderWeek();
  else renderList();
}

function renderMonth(){
  const body=document.getElementById('cal-body');
  const today=new Date();today.setHours(0,0,0,0);
  const fd=new Date(calYear,calMonth,1).getDay();
  const dim=new Date(calYear,calMonth+1,0).getDate();
  const dip=new Date(calYear,calMonth,0).getDate();
  const dows=['日','一','二','三','四','五','六'];
  let h='<div class="cal-month-grid">';
  dows.forEach(d=>h+=`<div class="cal-dow">${d}</div>`);
  for(let i=fd-1;i>=0;i--)h+=`<div class="cal-cell other"><div class="cnum">${dip-i}</div></div>`;
  for(let d=1;d<=dim;d++){
    const ds=dateKey(calYear,calMonth,d);
    const dt=new Date(calYear,calMonth,d);
    const isT=dt.getTime()===today.getTime();
    const isSel=selDate===ds;
    const {evs,todos,isW,isR}=getEvForDate(ds);
    let cls='cal-cell';
    if(isW)cls+=' wedding-d';else if(isR)cls+=' registry-d';
    if(isT)cls+=' today';if(isSel)cls+=' selected';
    const sorted=evs.sort((a,b)=>(a.start||'').localeCompare(b.start||''));
    const pills=[
      isW?`<div class="special-tag">💒婚禮</div>`:'',
      isR?`<div class="special-tag" style="background:var(--green)">📋登記</div>`:'',
      ...sorted.slice(0,2).map(e=>`<div class="ev-pill" style="background:${e.color||'var(--accent)'}">${e.start?e.start.slice(0,5)+' ':''}${esc(e.text)}</div>`),
      sorted.length>2?`<div style="font-size:9px;color:var(--text3);padding-left:2px">+${sorted.length-2}項</div>`:'',
      ...todos.slice(0,1).map(t=>`<div class="ev-pill todo-p">✅ ${esc(t.text)}</div>`),
    ].filter(Boolean);
    h+=`<div class="${cls}" onclick="selectCalDate('${ds}')"><div class="cnum">${d}</div>${pills.join('')}</div>`;
  }
  const total=fd+dim;const rem=total%7===0?0:7-(total%7);
  for(let d=1;d<=rem;d++)h+=`<div class="cal-cell other"><div class="cnum">${d}</div></div>`;
  h+='</div>';body.innerHTML=h;
}

function renderWeek(){
  const body=document.getElementById('cal-body');
  const today=new Date();today.setHours(0,0,0,0);
  const ref=selDate?parseDate(selDate):new Date();
  const sow=new Date(ref);sow.setDate(ref.getDate()-ref.getDay());
  const days=Array.from({length:7},(_,i)=>{const d=new Date(sow);d.setDate(sow.getDate()+i);return d});
  const dows=['日','一','二','三','四','五','六'];
  const hours=Array.from({length:24},(_,i)=>i);
  let h=`<div class="week-wrap"><div class="week-head"><div class="wh-cell" style="border-right:1px solid var(--border)"></div>`;
  days.forEach((d,i)=>{
    const isT=d.getTime()===today.getTime();
    h+=`<div class="wh-cell${isT?' today-c':''}"><div>${dows[i]}</div><div class="wdate">${d.getDate()}</div></div>`;
  });
  h+=`</div><div class="week-body"><div class="wtime-col">${hours.map(h=>`<div class="wtime">${String(h).padStart(2,'0')}:00</div>`).join('')}</div>`;
  days.forEach(d=>{
    const ds=dateKey(d.getFullYear(),d.getMonth(),d.getDate());
    const {evs,todos,isW,isR}=getEvForDate(ds);
    const slots=hours.map(()=>'<div class="wslot"></div>').join('');
    const wevs=evs.filter(e=>e.start).map(e=>{
      const[sh,sm]=e.start.split(':').map(Number);
      const top=sh*40+Math.floor(sm/60*40);
      let ht=40;if(e.end){const[eh,em]=e.end.split(':').map(Number);ht=Math.max(20,(eh*60+em-sh*60-sm)/60*40)}
      return`<div class="wev" style="top:${top}px;height:${ht}px;background:${e.color||'var(--accent)'}" onclick="event.stopPropagation();selectCalDate('${ds}')">${e.start.slice(0,5)} ${esc(e.text)}</div>`;
    }).join('');
    const sp=(isW||isR)?`<div style="background:${isW?'var(--accent)':'var(--green)'};color:#fff;font-size:9px;padding:2px 4px;position:absolute;top:0;left:2px;right:2px;border-radius:2px;z-index:3">${isW?'💒婚禮':'📋登記'}</div>`:'';
    h+=`<div class="wday-col" onclick="selectCalDate('${ds}')" style="position:relative">${sp}${slots}${wevs}</div>`;
  });
  h+=`</div></div>`;body.innerHTML=h;
}

function renderList(){
  const body=document.getElementById('cal-body');
  const allEvs=[];
  for(let mi=0;mi<3;mi++){
    const y=calMonth+mi>11?calYear+1:calYear;
    const m=(calMonth+mi)%12;
    const dim=new Date(y,m+1,0).getDate();
    for(let d=1;d<=dim;d++){
      const ds=dateKey(y,m,d);
      const {evs,todos,isW,isR}=getEvForDate(ds);
      if(evs.length||todos.length||isW||isR)allEvs.push({ds,evs,todos,isW,isR});
    }
  }
  if(!allEvs.length){body.innerHTML='<div class="empty"><div class="emoji">📅</div>未來3個月沒有行程</div>';return}
  const dows=['日','一','二','三','四','五','六'];
  let h='<div style="padding:4px 0">';
  allEvs.forEach(({ds,evs,todos,isW,isR})=>{
    const dt=parseDate(ds);
    const label=`${ds.replace(/\//g,'-')} ${dows[dt.getDay()]}`;
    h+=`<div class="list-date-h">${label}</div>`;
    if(isW)h+=`<div class="list-ev"><div class="list-ev-bar" style="background:var(--accent)"></div><div><div class="list-ev-title">💒 婚禮</div></div></div>`;
    if(isR)h+=`<div class="list-ev"><div class="list-ev-bar" style="background:var(--green)"></div><div><div class="list-ev-title">📋 登記</div></div></div>`;
    evs.sort((a,b)=>(a.start||'').localeCompare(b.start||'')).forEach(e=>{
      h+=`<div class="list-ev" onclick="selectCalDate('${ds}')">
        <div class="list-ev-bar" style="background:${e.color||'var(--accent)'}"></div>
        <div><div class="list-ev-title">${e.start?`<span style="color:var(--text3);font-size:11px">${e.start}${e.end?'–'+e.end:''} </span>`:''}${esc(e.text)}</div>
        ${e.note?`<div class="list-ev-note">📝 ${esc(e.note)}</div>`:''}</div></div>`;
    });
    todos.forEach(t=>h+=`<div class="list-ev"><div class="list-ev-bar" style="background:var(--green)"></div><div><div class="list-ev-title${t.done?' done':''}">✅ ${esc(t.text)}</div></div></div>`);
  });
  h+='</div>';body.innerHTML=h;
}

function selectCalDate(ds){
  selDate=ds;
  if(calView==='month')renderMonth();
  else if(calView==='week'){const d=parseDate(ds);calYear=d.getFullYear();calMonth=d.getMonth();renderWeek();}
  showEvPanel(ds);
}

    <div class="frow" style="margin-top:8px"><div class="field" style="flex:1"><label>備注</label><textarea id="em-note">${esc(e.note||'')}</textarea></div></div>
    <div style="margin-top:10px"><div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">顏色</div>
    <div class="color-row">${EV_COLORS.map(c=>`<div class="cswatch${c===(e.color||EV_COLORS[0])?' sel':''}" style="background:${c}" onclick="this.parentElement.querySelectorAll('.cswatch').forEach(s=>s.classList.remove('sel'));this.classList.add('sel');window._editEvColor='${c}'"></div>`).join('')}</div></div>`;
  window._editEvColor=e.color||EV_COLORS[0];
  openEditModal(e.text, bodyHtml, async()=>{
    const nt=document.getElementById('em-text').value.trim();if(nt)e.text=nt;
    e.start=document.getElementById('em-start').value;
    e.end=document.getElementById('em-end').value;
    e.type=document.getElementById('em-type').value;
    e.note=document.getElementById('em-note').value;
    e.color=window._editEvColor||e.color;
    renderCalendar();showEvPanel(ds);await saveData();
  });
}

function initColorPicker(){
  const p=document.getElementById('ev-color-picker');if(!p)return;
  p.innerHTML=EV_COLORS.map(c=>`<div class="cswatch${c===selColor?' sel':''}" style="background:${c}" onclick="selColor='${c}';this.parentElement.querySelectorAll('.cswatch').forEach(s=>s.classList.remove('sel'));this.classList.add('sel')"></div>`).join('');
}

async function addCalEvent(){
  if(!selDate)return;
  const text=document.getElementById('ev-text').value.trim();if(!text)return;
  if(!db.events)db.events=[];
  db.events.push({id:Date.now(),date:selDate,text,type:document.getElementById('ev-type').value,color:selColor,start:document.getElementById('ev-start').value,end:document.getElementById('ev-end').value,note:document.getElementById('ev-note').value.trim()});
  document.getElementById('ev-text').value='';document.getElementById('ev-start').value='';document.getElementById('ev-end').value='';document.getElementById('ev-note').value='';
  renderCalendar();showEvPanel(selDate);await saveData();
}

async function deleteCalEv(id){
  const e=(db.events||[]).find(e=>e.id===id);
  if(!confirm('確定要刪除行程「'+(e?e.text:'此行程')+'」嗎？'))return;
  if(!db.events)return;db.events=db.events.filter(e=>e.id!==id);
  renderCalendar();if(selDate)showEvPanel(selDate);await saveData();
}

function syncVendorToExpense(v){
  if(!v.name)return;
  // find matching expense by vendorId or name
  let e=db.expenses.find(ex=>ex.vendorId===v.id);
  if(!e&&(v.paid||v.unpaid)){
    // create new expense linked to this vendor
    e={id:Date.now()+(Math.random()*100|0),name:v.name,cat:v.type,paid:v.paid||0,unpaid:v.unpaid||0,note:v.note||'',files:[],vendorId:v.id};
    db.expenses.push(e);
  } else if(e){
    // update existing expense
    e.name=v.name;
    e.cat=v.type;
    e.paid=v.paid||0;
    e.unpaid=v.unpaid||0;
    e.note=v.note||'';
  }
}

function renderAll(){renderTodos();renderExpenses();renderVendors();renderGuests();renderCalendar()}
loadData();
</script>
</body>
</html>
